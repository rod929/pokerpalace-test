<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poker Palace — Admin View (Cloud)</title>
<style>
  body{margin:0;background:#16161a;color:#ecebe9;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;padding:26px 16px 60px;line-height:1.5}
  .wrap{max-width:620px;margin:0 auto}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:#a5a4a8;font-size:13.5px;margin:0 0 20px}
  .card{background:#22222a;border:1px solid #34343a;border-radius:14px;padding:18px;margin-bottom:16px}
  .card h2{font-size:15px;margin:0 0 12px}
  label{display:block;font-size:13px;color:#a5a4a8;margin:12px 0 5px}
  input{width:100%;box-sizing:border-box;background:#1e1e23;border:1px solid #34343a;border-radius:9px;color:#ecebe9;font-size:15px;padding:11px 12px;outline:none;font-family:inherit}
  input:focus{border-color:#7fa0c4}
  button{margin-top:16px;border:none;font-weight:600;font-size:15px;border-radius:10px;padding:13px;cursor:pointer}
  .primary{background:#7fa0c4;color:#0e1a26;width:100%} .primary:hover{filter:brightness(1.08)}
  .ghost{background:#2a2a30;border:1px solid #34343a;color:#ecebe9;padding:7px 12px;font-size:12.5px;margin:0}
  .ghost:hover{border-color:#e07a5f;color:#e07a5f}
  button:disabled{opacity:.5;cursor:not-allowed}
  .status{padding:12px 14px;border-radius:11px;font-size:13.5px;margin-bottom:16px;border:1px solid #34343a;background:#22222a;display:none}
  .status.show{display:block}
  .status.ok{border-color:#3f8c66;background:rgba(92,184,138,.1);color:#9fe3c0}
  .status.err{border-color:#a4493a;background:rgba(224,122,95,.1);color:#f0b3a3}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#22222a;border:1px solid #34343a;border-radius:11px;padding:11px 14px;margin-bottom:8px;font-size:13px}
  .bar .who{color:#a5a4a8} .bar .who b{color:#ecebe9}
  .rolepill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 9px;border-radius:20px;margin-left:6px}
  .rolepill.admin{background:rgba(201,184,150,.15);color:#c9b896}
  .rolepill.td{background:rgba(127,160,196,.15);color:#7fa0c4}
  .scope{font-size:12.5px;color:#a5a4a8;margin:14px 0 10px}
  .co{background:#22222a;border:1px solid #34343a;border-radius:11px;padding:13px 15px;margin-bottom:9px}
  .cotop{display:flex;justify-content:space-between;gap:10px}
  .coname{font-weight:700;font-size:15px}
  .codate{color:#a5a4a8;font-size:12.5px;font-family:'JetBrains Mono',monospace}
  .cometa{color:#a5a4a8;font-size:12.5px;margin-top:5px;font-family:'JetBrains Mono',monospace}
  .cowho{color:#7e90a5;font-size:11px;margin-top:6px;font-family:'JetBrains Mono',monospace}
  .coclick{cursor:pointer;transition:border-color .15s} .coclick:hover{border-color:#D00E26}
  .codetail{margin-top:10px;padding-top:10px;border-top:1px solid #34343a}
  .dgrid{display:grid;grid-template-columns:1fr auto 1fr auto;gap:5px 10px;font-size:12.5px;margin-bottom:8px}
  .dgrid .dk{color:#76757a} .dgrid .dv{font-family:'JetBrains Mono',monospace;text-align:right}
  .dsec{font-family:'Archivo',sans-serif;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#a5a4a8;margin:11px 0 6px}
  .dl{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #26262b;font-size:12.5px} .dl:last-child{border-bottom:none} .dl span:last-child{font-family:'JetBrains Mono',monospace;color:#c9b896}
  .dmut{color:#76757a;font-size:12px;padding:4px 0}
  .dchips{display:flex;flex-wrap:wrap;gap:5px} .dchip{background:#1e1e23;border:1px solid #34343a;border-radius:13px;padding:4px 10px;font-size:12px;color:#a5a4a8} .dchip.w{background:rgba(201,184,150,.13);border-color:#c9b896;color:#c9b896;font-weight:600}
  .cobox{background:#1b1b21;border:1px solid #3a3a44;border-radius:10px;padding:12px 13px;margin-bottom:4px}
  .pnlbox{background:linear-gradient(160deg,#241f2e,#2a2438);border:1px solid #5a4a7a;border-radius:10px;padding:12px 13px;margin-bottom:4px;box-shadow:0 0 0 1px rgba(127,100,180,.15) inset}
  .secbox{background:#1c1d22;border:1px solid #313640;border-radius:10px;padding:11px 13px;margin-bottom:4px}
  .netprofit{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:12px 13px;border-radius:9px;background:rgba(92,184,138,.1);border:1px solid #3f8c66}
  .netprofit.neg{background:rgba(224,122,95,.1);border-color:#a14b39}
  .netprofit span:first-child{font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:.05em;color:#d8d8d8}
  .netprofit .npval{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;color:#5cb88a}
  .netprofit.neg .npval{color:#e07a5f}
  #app.hidden,#loginCard.hidden{display:none}
</style>

<div class="wrap">
  <h1>🛡️ Poker Palace — Admin View</h1>
  <p class="sub">Sign in. If you're an admin you'll see <b>all</b> close-outs; if you're a TD, only your own. The cloud enforces this — same page, different data per role.</p>

  <div id="status" class="status"></div>

  <div class="card" id="loginCard">
    <h2>Sign in</h2>
    <label>Email</label>
    <input id="email" type="email" placeholder="admin@test.com" autocomplete="username">
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="primary" id="signinBtn">Sign in</button>
  </div>

  <div id="app" class="hidden">
    <div class="bar">
      <div class="who">Signed in as <b id="whoEmail">—</b> <span id="rolePill"></span></div>
      <button class="ghost" id="signoutBtn">Sign out</button>
    </div>
    <div class="scope" id="scope"></div>
    <div id="coList"></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const SUPABASE_URL = 'https://tqlwkqtlxvozrgsavupg.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_vzcUkFyHTKSHr5SQV6WUMA_XpiEOT0z';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  const $ = id => document.getElementById(id);
  function showDbg(msg){
    let dbg=document.getElementById('__dbg');
    if(!dbg){ dbg=document.createElement('div'); dbg.id='__dbg'; dbg.style.cssText='position:fixed;left:8px;right:8px;bottom:8px;z-index:99999;background:#1a1a22;border:1px solid #7fa0c4;color:#cde;font:12px/1.4 monospace;padding:8px 10px;border-radius:8px;max-height:30vh;overflow:auto'; document.body.appendChild(dbg); }
    dbg.textContent='DBG: '+msg;
  }

  function setStatus(m,k){ const s=$('status'); s.className='status show '+k; s.innerHTML=m; }
  function clearStatus(){ $('status').className='status'; }

  async function showApp(user){
    $('loginCard').classList.add('hidden');
    $('app').classList.remove('hidden');
    $('whoEmail').textContent = user.email;

    // look up this user's role from profiles
    let role = 'td';
    try {
      const { data, error } = await supabase.from('profiles').select('role').eq('user_id', user.id);
      if (!error && Array.isArray(data) && data.length) role = (data.find(r=>r.role==='admin'||r.role==='owner')?'admin':(data[0].role||'td'));
    } catch(e){ /* no profile row → default td */ }

    $('rolePill').innerHTML = '<span class="rolepill '+(role==='admin'?'admin':'td')+'">'+role.toUpperCase()+'</span>';
    $('scope').innerHTML = (role==='admin')
      ? '👁️ You are an <b>admin</b> — the list below shows <b>every</b> close-out from all TDs.'
      : '🔒 You are a <b>TD</b> — the list shows <b>only your own</b> close-outs.';

    loadCloseouts();
  }
  function showLogin(){ $('app').classList.add('hidden'); $('loginCard').classList.remove('hidden'); }

  let CO_DATA=[], PLC_DATA=[], SHF_DATA=[], PROFMAP={}, TKMAP={}, GAMES_D=[], VENUES_D=[], SMS_D=[], CORR_DATA=[];
  function tdName(uid){ return (uid&&PROFMAP[String(uid).toLowerCase().trim()]) || (uid?('TD '+String(uid).slice(0,6)):'Unknown'); }
  // lightweight net profit for the LIST card — mirrors the Final P&L logic in coDetail
  function cardNet(c){
    const isCash=x=> x.is_cash_game===true || x.game_name==='Rake Free Cash Game';
    const g=GAMES_D.find(x=>x.name===c.game_name)||{};
    const entries=Number(c.entries)||0, addons=Number(c.addons)||0;
    const buyin=Number(g.buy_in)||0, rake=Number(g.rake)||0, addonPrice=Number(g.addon_price)||0, gtee=Number(g.guarantee)||0;
    const pool=(buyin-rake)*entries + addonPrice*addons;
    const overlay=Math.max(0, gtee-pool);
    const margin=(c.void===true)?0:(rake*entries-overlay);
    const promo=Number(c.promo_cost)||0;
    const sms=SMS_D.filter(x=>(x.closeout_id&&String(x.closeout_id)===String(c.id))||(!x.closeout_id&&x.game_name===c.game_name&&x.charge_date===c.game_date)).reduce((s,x)=>s+(Number(x.amount)||0),0);
    // whole-night staff + club + cash game (matching Final P&L)
    const nightCoIds=(CO_DATA||[]).filter(x=>x.venue_name===c.venue_name && x.game_date===c.game_date).map(x=>String(x.id));
    const nightWages=SHF_DATA.filter(s=>nightCoIds.includes(String(s.closeout_id))).reduce((s,x)=>s+(Number(x.hours)||0)*(Number(x.rate)||0),0);
    const cash=(CO_DATA||[]).find(x=>isCash(x) && x.venue_name===c.venue_name && x.game_date===c.game_date);
    const cashPromo=cash?(Number(cash.promo_cost)||0):0;
    const v=VENUES_D.find(x=>x.name===c.venue_name)||{};
    const basis=v.club_money_basis||'', rate2=Number(v.club_money_rate)||0;
    let club=0;
    if(basis==='fixed_monthly'){ const ym=(c.game_date||'').slice(0,7); const gm=CO_DATA.filter(x=>x.venue_name===c.venue_name && (x.game_date||'').slice(0,7)===ym && !isCash(x)).length||1; club=rate2/gm; }
    else if(rate2){ club=rate2; }
    const tournamentNet=(c.void===true)?0:(g.name?(margin-sms-promo):0);
    return tournamentNet + club - nightWages - cashPromo;
  }
  async function loadCloseouts(){
    try{
      const { data, error } = await supabase.from('closeouts').select('*').order('id',{ascending:false});
      if(error) throw error;
      CO_DATA=data||[];
      // supporting data for detail + names
      PLC_DATA=(await supabase.from('placings').select('*')).data||[];
      SHF_DATA=(await supabase.from('staff_shifts').select('*')).data||[];
      try{ CORR_DATA=(await supabase.from('closeout_corrections').select('*')).data||[]; }catch(e){ CORR_DATA=[]; }
      const profs=(await supabase.from('profiles').select('*')).data||[];
      PROFMAP={}; profs.forEach(p=>{ if(p.user_id) PROFMAP[String(p.user_id).toLowerCase().trim()]=p.full_name||p.name||null; });
      const tks=(await supabase.from('tickets').select('*')).data||[];
      TKMAP={}; tks.forEach(t=>TKMAP[t.id]=t.name);
      GAMES_D=(await supabase.from('games').select('*')).data||[];
      VENUES_D=(await supabase.from('venues').select('*')).data||[];
      SMS_D=(await supabase.from('sms_charges').select('*')).data||[];
      if(!CO_DATA.length){ $('coList').innerHTML='<div class="co">No close-outs visible to you.</div>'; return; }
      // helper: is this close-out the parallel rake-free cash game (saved as its own record)?
      const isCashCo=c=> c.is_cash_game===true || c.game_name==='Rake Free Cash Game';
      // build the visible list: hide standalone cash-game records (they fold into the tournament card for that venue+date)
      const visible=CO_DATA.filter(c=>!isCashCo(c));
      // map each visible close-out index back to its CO_DATA index, and find its paired cash game
      const findCash=(c)=> CO_DATA.find(x=>isCashCo(x) && x.venue_name===c.venue_name && x.game_date===c.game_date) || null;
      $('coList').innerHTML = visible.map((c)=>{
        const i=CO_DATA.indexOf(c);
        const cash=findCash(c);
        const draftTag = c.is_draft===true ? ' <span style="font-size:10px;background:#e0ad55;color:#1a1a22;font-weight:700;border-radius:5px;padding:1px 6px;margin-left:6px">DRAFT</span>' : '';
        const tag = (cash ? ' <span style="font-size:10px;color:#7fa0c4;border:1px solid #7fa0c4;border-radius:5px;padding:1px 6px;margin-left:6px">+ cash game</span>' : '') + draftTag;
        const net=cardNet(c);
        const netCol=net>=0?'#5cb88a':'#e07a5f';
        const netStr=(net<0?'-$':'$')+Math.abs(Math.round(net)).toLocaleString();
        return '<div class="co coclick" data-co="'+i+'"><div class="cotop"><div class="coname">'+(c.game_name||'(no name)')+tag+'</div>'+
        '<div class="codate">'+(c.game_date||'')+'</div></div>'+
        '<div class="cometa">'+(c.venue_name||'')+' · '+(c.entries||0)+' entries · money in $'+(c.money_in||0)+' · leftover $'+(c.leftover_cash||0)+'</div>'+
        '<div class="conet" style="font-family:JetBrains Mono;font-weight:700;font-size:26px;color:'+netCol+';margin:8px 0 2px">'+netStr+'<span style="font-size:11px;color:#76757a;font-weight:400;margin-left:8px">net for the day</span></div>'+
        '<div class="cowho">submitted by <b style="color:#c9b896">'+tdName(c.submitted_by)+'</b> <span style="float:right;color:#7fa0c4">tap for detail ›</span></div>'+
        '<div style="text-align:right;margin-top:6px"><button class="codelete" data-coid="'+c.id+'" data-coname="'+(c.game_name||'this report').replace(/"/g,'')+'" data-codate="'+(c.game_date||'')+'" style="background:none;border:1px solid #6a3a3a;color:#c98a8a;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">🗑 delete report</button></div>'+
        '<div class="codetail" id="codetail'+i+'" style="display:none"></div></div>';
      }).join('');
      // also render any ORPHAN cash games (cash game with no matching tournament that night) as their own card
      const orphans=CO_DATA.filter(c=>isCashCo(c) && !visible.some(t=>t.venue_name===c.venue_name && t.game_date===c.game_date));
      if(orphans.length){
        $('coList').innerHTML += orphans.map(c=>{ const i=CO_DATA.indexOf(c);
          const onet=cardNet(c); const ocol=onet>=0?'#5cb88a':'#e07a5f'; const ostr=(onet<0?'-$':'$')+Math.abs(Math.round(onet)).toLocaleString();
          return '<div class="co coclick" data-co="'+i+'"><div class="cotop"><div class="coname">🎲 '+(c.game_name||'Rake Free Cash Game')+'</div>'+
          '<div class="codate">'+(c.game_date||'')+'</div></div>'+
          '<div class="cometa">'+(c.venue_name||'')+' · cash game only</div>'+
          '<div class="conet" style="font-family:JetBrains Mono;font-weight:700;font-size:26px;color:'+ocol+';margin:8px 0 2px">'+ostr+'<span style="font-size:11px;color:#76757a;font-weight:400;margin-left:8px">net for the day</span></div>'+
          '<div class="cowho">submitted by <b style="color:#c9b896">'+tdName(c.submitted_by)+'</b> <span style="float:right;color:#7fa0c4">tap for detail ›</span></div>'+
          '<div style="text-align:right;margin-top:6px"><button class="codelete" data-coid="'+c.id+'" data-coname="'+(c.game_name||'this cash game').replace(/"/g,'')+'" data-codate="'+(c.game_date||'')+'" style="background:none;border:1px solid #6a3a3a;color:#c98a8a;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">🗑 delete report</button></div>'+
          '<div class="codetail" id="codetail'+i+'" style="display:none"></div></div>';
      }).join('');
      }
      document.querySelectorAll('.coclick').forEach(el=>{
        el.addEventListener('click',(ev)=>{
          try{
            const i=+el.dataset.co; const d=$('codetail'+i);
            if(!d){ return; }
            const open=(d.style.display==='none'||d.style.display==='');
            d.style.display=open?'block':'none';
            if(open&&!d.dataset.built){
              try{ d.innerHTML=coDetail(CO_DATA[i]); d.dataset.built='1'; wireAck(d); }
              catch(err){ d.innerHTML='<div class="dmut" style="color:#e07a5f;padding:12px">⚠ '+(err&&err.message?err.message:err)+'</div>'; }
            }
          }catch(outer){ console.error('click error',outer); }
        });
      });
      document.querySelectorAll('.codelete').forEach(btn=>{
        btn.addEventListener('click',(ev)=>{ ev.stopPropagation(); deleteCloseout(btn.dataset.coid, btn.dataset.coname, btn.dataset.codate); });
      });
      // deep-link: if URL has #co=ID, auto-open that specific tournament and scroll to it
      const hash=window.location.hash||'';
      const mm=hash.match(/co=([^&]+)/);
      if(mm){
        const targetId=decodeURIComponent(mm[1]);
        const idx=CO_DATA.findIndex(c=>String(c.id)===String(targetId));
        if(idx>=0){
          const d=$('codetail'+idx);
          if(d){ d.style.display='block'; if(!d.dataset.built){ try{ d.innerHTML=coDetail(CO_DATA[idx]); }catch(err){ d.innerHTML='<div class="dmut" style="color:#e07a5f">Could not build: '+(err.message||err)+'</div>'; } d.dataset.built='1'; wireAck(d); } }
          const card=document.querySelector('.coclick[data-co="'+idx+'"]');
          if(card){ card.style.outline='2px solid #7fa0c4'; card.style.borderRadius='12px'; setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'start'}),200); }
        }
      }
    }catch(e){ setStatus('Could not load close-outs: '+(e.message||e),'err'); }
  }
  async function deleteCloseout(id, name, date){
    if(!id) return;
    const ok=confirm('⚠ Delete this report permanently?\n\n'+(name||'Report')+(date?(' — '+date):'')+'\n\nThis removes the close-out and all its placings and staff/wages. This CANNOT be undone.');
    if(!ok) return;
    const ok2=confirm('Are you absolutely sure? This permanently deletes the report and everything linked to it.');
    if(!ok2) return;
    try{
      // remove linked rows first, then the close-out
      await supabase.from('placings').delete().eq('closeout_id', id);
      await supabase.from('staff_shifts').delete().eq('closeout_id', id);
      try{ await supabase.from('closeout_corrections').delete().eq('closeout_id', id); }catch(e){}
      try{ await supabase.from('cash_movements').delete().eq('closeout_id', id); }catch(e){}
      const { error } = await supabase.from('closeouts').delete().eq('id', id);
      if(error) throw error;
      setStatus('✓ Report deleted.','ok');
      // remove from local data and re-render
      CO_DATA = CO_DATA.filter(c=>String(c.id)!==String(id));
      loadCloseouts();
    }catch(e){ setStatus('Could not delete: '+(e.message||e),'err'); alert('Could not delete the report: '+(e.message||e)); }
  }
  function coDetail(c){
    const money=n=>{n=Math.round(Number(n)||0);return (n<0?'-$':'$')+Math.abs(n).toLocaleString();};
    const row0=(k,v,col)=>'<div class="dl"><span>'+k+'</span><span'+(col?(' style="color:'+col+'"'):'')+'>'+v+'</span></div>';
    // standalone Rake Free Cash Game close-out (orphan, or opened directly): show ONLY players + promo + staff
    if(c.is_cash_game===true || c.game_name==='Rake Free Cash Game'){
      const cashPlayers=((c.ges_players||'').split(/\n|,/).map(s=>s.trim()).filter(Boolean)).length;
      const cashPromo=Number(c.promo_cost)||0;
      const cshf=SHF_DATA.filter(s=>String(s.closeout_id)===String(c.id));
      const cwages=cshf.reduce((s,x)=>s+(Number(x.hours)||0)*(Number(x.rate)||0),0);
      let hh='<div class="dsec">🎲 Rake Free Cash Game</div>'+
        '<div class="cobox" style="border-color:#2f4a63"><div class="dl"><span>Players</span><span>'+cashPlayers+'</span></div>'+
        '<div class="dl"><span>Promotional cost</span><span style="color:'+(cashPromo>0?'#e07a5f':'#76757a')+'">'+(cashPromo>0?('-'+money(cashPromo)):money(0))+'</span></div></div>';
      hh+='<div class="dsec">👷 Staff</div><div class="secbox">';
      hh+= cshf.length? cshf.map(s=>{const hrs=Math.round((Number(s.hours)||0)*10)/10; const rate=Number(s.rate)||0; const t=(s.start&&s.finish)?(s.start+'–'+s.finish):(hrs+'h'); return '<div class="dl"><span>'+(s.staff_name||'')+(s.role?(' · '+s.role):'')+' · '+t+' · $'+rate+'/h</span><span>'+money(hrs*rate)+'</span></div>';}).join(''):'<div class="dmut">No staff recorded against the cash game (may be on the tournament close-out for this night).</div>';
      hh+='</div>';
      return hh;
    }
    const plc=PLC_DATA.filter(p=>String(p.closeout_id)===String(c.id)).sort((a,b)=>a.place-b.place);
    const shf=SHF_DATA.filter(s=>String(s.closeout_id)===String(c.id));
    const suf=n=>n===1?'st':n===2?'nd':n===3?'rd':'th';
    const players=((c.ges_players||'').split(/\n|,/).map(s=>s.trim()).filter(Boolean));
    const winNames=new Set(plc.filter(p=>Number(p.amount)>0).map(p=>(p.player_name||'').toLowerCase()));

    // --- economics from game setup ---
    const g=GAMES_D.find(x=>x.name===c.game_name)||{};
    const entries=Number(c.entries)||0, addons=Number(c.addons)||0;
    const buyin=Number(g.buy_in)||0, rake=Number(g.rake)||0, addonPrice=Number(g.addon_price)||0, gtee=Number(g.guarantee)||0;
    const pool=(buyin-rake)*entries + addonPrice*addons;
    const overlay=Math.max(0, gtee-pool);
    const rakeColl=rake*entries;
    const margin=rakeColl-overlay;
    const wages=shf.reduce((s,x)=>s+(Number(x.hours)||0)*(Number(x.rate)||0),0);
    // for the Rake Free Cash Game close-out, staff may have been logged against the void tournament
    // that same night/venue — gather those so wages show here (the game that actually ran).
    const isCashGameCo = c.is_cash_game===true || c.game_name==='Rake Free Cash Game';
    let nightWages=wages;
    if(isCashGameCo && wages===0){
      const nightCoIds=(CO_DATA||[]).filter(x=>x.venue_name===c.venue_name && x.game_date===c.game_date).map(x=>String(x.id));
      nightWages=SHF_DATA.filter(s=>nightCoIds.includes(String(s.closeout_id))).reduce((s,x)=>s+(Number(x.hours)||0)*(Number(x.rate)||0),0);
    }
    // SMS attributed to this close-out (or matching game+date)
    const sms=SMS_D.filter(x=> (x.closeout_id&&String(x.closeout_id)===String(c.id)) || (!x.closeout_id&&x.game_name===c.game_name&&x.charge_date===c.game_date) ).reduce((s,x)=>s+(Number(x.amount)||0),0);
    // club money share
    const v=VENUES_D.find(x=>x.name===c.venue_name)||{};
    const basis=v.club_money_basis||'', rate2=Number(v.club_money_rate)||0;
    let club=0, clubLbl='';
    // for a void game, club only applies if a rake-free game ran same venue+date
    const voidHere = c.void===true;
    const rakeFreeRanTonight = (CO_DATA||[]).some(x=>x.venue_name===c.venue_name && x.game_date===c.game_date && (
      x.is_cash_game===true || x.game_name==='Rake Free Cash Game' || (GAMES_D.find(gg=>gg.name===x.game_name)||{}).rake_free===true
    ));
    if(voidHere){
      // void tournament: club fee + wages are shown on the Rake Free Cash Game close-out instead
      // (that's the game that actually ran), so the void shows $0 club to avoid double-counting.
      club=0; clubLbl=rakeFreeRanTonight?' (shown on cash game)':' (void, no other game)';
    } else if(basis==='fixed_monthly'){
      const ym=(c.game_date||'').slice(0,7);
      const gamesThatMonth=CO_DATA.filter(x=>x.venue_name===c.venue_name && (x.game_date||'').slice(0,7)===ym).length || 1;
      club=rate2/gamesThatMonth; clubLbl=' (monthly '+money(rate2)+' ÷ '+gamesThatMonth+' games)';
    } else if(rate2){ club=rate2; clubLbl=' (per game)'; }
    const net=margin+club-wages-sms;
    const promo=Number(c.promo_cost)||0;
    const isRakeFree = g.rake_free===true || c.is_cash_game===true || c.game_name==='Rake Free Cash Game';
    const isVoid = c.void===true;

    // --- prize payment breakdown (split-aware) ---
    let pcash=0,ptfr=0,ptkt=0;
    plc.forEach(p=>{
      const a2=Number(p.amount_2)||0,a3=Number(p.amount_3)||0,a1=(Number(p.amount)||0)-a2-a3;
      [[p.paid_by,a1],[p.paid_by_2,a2],[p.paid_by_3,a3]].forEach(([m,a])=>{ if(!m)return; if(m==='transfer')ptfr+=a; else if(m==='ticket')ptkt+=a; else pcash+=a; });
    });
    const prizesPaid=plc.reduce((s,p)=>s+(Number(p.amount)||0),0);

    const row=(k,v,col)=>'<div class="dl"><span>'+k+'</span><span'+(col?(' style="color:'+col+'"'):'')+'>'+v+'</span></div>';

    // VOID tournament: minimal view — just a VOID banner, then straight to the cash game section + day total
    if(isVoid){
      let hv='<a href="closeout_live.html#edit='+c.id+'" style="display:inline-block;background:#c9b896;color:#1a1205;font-weight:700;text-decoration:none;border-radius:8px;padding:9px 14px;font-size:13px;margin-bottom:12px">✏️ Edit / correct this close-out ›</a>'+
        '<div class="dsec">💵 Game P&amp;L</div>'+
        '<div class="pnlbox" style="border-color:#a14b39">'+
        '<div class="dl"><span>⛔ '+(c.game_name||'Tournament')+' — VOID</span><span style="color:#e07a5f">did not run (insufficient players)</span></div>'+
        '</div>';
      hv += unifiedCashSection(c, g, {isVoid:true, margin:0, sms:0, promo:0, basis, rate2});
      return hv;
    }

    let h='<a href="closeout_live.html#edit='+c.id+'" style="display:inline-block;background:#c9b896;color:#1a1205;font-weight:700;text-decoration:none;border-radius:8px;padding:9px 14px;font-size:13px;margin-bottom:12px">✏️ Edit / correct this close-out ›</a>'+
      '<div class="dsec">📋 Close-out sheet</div><div class="cobox"><div class="dgrid">'+
      ['Entries|'+entries,'Unique|'+(c.unique_players||0),'Re-entries|'+(c.re_entries||0),'Add-ons|'+addons,
       'Cash in|'+money(c.cash_in),'Transfer in|'+money(c.transfer_in),'Ticket in|'+money(c.ticket_in),'Other in|'+money(c.other_in),
       'Money in|'+money(c.money_in),'Leftover|'+money(c.leftover_cash)].map(x=>{const[k,vv]=x.split('|');return '<div class="dk">'+k+'</div><div class="dv">'+vv+'</div>';}).join('')+'</div></div>';
    // explicit "cash the TD should be holding" — matches the dashboard's TD-held figure
    h+='<div class="cobox" style="border-color:#c9b896;margin-top:8px"><div class="dl"><span>💵 Cash '+(tdName(c.submitted_by)||'this TD')+' should be holding</span><span style="color:#5cb88a;font-weight:700">'+money(c.leftover_cash)+'</span></div>'+
      '<div class="dmut" style="font-size:11px;margin-top:4px">= Cash in '+money(c.cash_in)+' − cash prizes paid out. This is the leftover the TD hands up (matches the Total cash held screen).</div></div>';
    // admin correction audit trail
    const corrs=(CORR_DATA||[]).filter(x=>String(x.closeout_id)===String(c.id)).sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
    if(corrs.length){
      h+='<div class="cobox" style="border-color:#7a6a3a;background:rgba(201,184,150,.06);margin-top:8px"><div style="font-size:12px;font-weight:700;color:#c9b896;margin-bottom:6px">✏️ Admin corrections ('+corrs.length+')</div>'+
        corrs.map(x=>'<div style="font-size:11.5px;color:#cdbf9e;padding:4px 0;border-top:1px solid rgba(201,184,150,.15)"><b>'+(x.corrected_by_name||'admin')+'</b> <span style="color:#8a8270;font-family:JetBrains Mono;font-size:10px">'+((x.created_at||'').slice(0,16).replace('T',' '))+'</span><br>'+(x.note||'')+'</div>').join('')+
      '</div>';
    }

    // P&L block
    h+='<div class="dsec">💵 Game P&amp;L</div>';
    if(isVoid){
      const voidWages = rakeFreeRanTonight ? 0 : wages; // if cash game ran, wages show on that close-out
      h+='<div class="pnlbox" style="border-color:#a14b39">'+
        '<div class="dl"><span>⛔ Game void — did not run</span><span style="color:#e07a5f">insufficient players</span></div>'+
        row('Rake / margin', money(0))+
        row('Guarantee liability', money(0)+' (void)')+
        row('Club money', club>0?('+'+money(club)):money(0)+(rakeFreeRanTonight?' (shown on cash game)':' (no other game)'), club>0?'#5cb88a':'')+
        row('Less: staff wages', voidWages>0?('-'+money(voidWages)):money(0)+(rakeFreeRanTonight&&wages>0?' (shown on cash game)':''), voidWages>0?'#e07a5f':'')+
        '<div class="netprofit '+((club-voidWages)>=0?'pos':'neg')+'"><span>NET RESULT</span><span class="npval">'+money(club-voidWages)+'</span></div>'+
        '</div>';
    } else if(isRakeFree){
      const rfNet=club-nightWages-promo;
      h+='<div class="pnlbox">'+
        '<div class="dl"><span>🎲 Rake Free Cash Game</span><span style="color:#7fa0c4">no rake / margin</span></div>'+
        (club>0?row('Club money'+clubLbl, '+'+money(club), '#5cb88a'):'')+
        row('Promotion cost', promo>0?('-'+money(promo)):money(0), promo>0?'#e07a5f':'')+
        (nightWages>0?row('Less: staff wages', '-'+money(nightWages), '#e07a5f'):'')+
        '<div class="netprofit '+(rfNet>=0?'pos':'neg')+'"><span>NET FOR THE DAY</span><span class="npval">'+money(rfNet)+'</span></div>'+
        '</div>';
    } else {
    h+= g.name ? ('<div class="pnlbox">'+
      row('Rake collected ('+money(rake)+' × '+entries+')',money(rakeColl))+
      row('Less: overlay',overlay>0?('-'+money(overlay)):money(0), overlay>0?'#e07a5f':'')+
      '<div class="dl" style="border-top:1px solid #34343a"><span><b>Gaming margin</b></span><span style="font-family:JetBrains Mono">'+money(margin)+'</span></div>'+
      row('Club money'+clubLbl, club>0?('+'+money(club)):money(0), '#5cb88a')+
      row('Less: staff wages', wages>0?('-'+money(wages)):money(0), wages>0?'#e07a5f':'')+
      row('Less: SMS charges', sms>0?('-'+money(sms)):money(0), sms>0?'#e07a5f':'')+
      (promo>0?row('Less: promotion cost','-'+money(promo),'#e07a5f'):'')+
      '<div class="netprofit '+((net-promo)>=0?'pos':'neg')+'"><span>GAME NET PROFIT</span><span class="npval">'+money(net-promo)+'</span></div>'+
      '</div>'
    ) : '<div class="dmut">No game setup found for "'+(c.game_name||'')+'" — can\'t compute rake/overlay. (Game may be renamed or retired.)</div>';
    }

    // overlay acknowledgement (informational — overlay already paid; ack to clear the dashboard flag)
    if(overlay>0 && !isVoid && !isRakeFree){
      if(c.overlay_ack===true){
        h+='<div class="secbox" style="border-color:#5cb88a;background:rgba(92,184,138,.06)"><div class="dl"><span style="color:#5cb88a">✓ Overlay acknowledged</span><span style="color:#76757a;font-size:11px">'+money(overlay)+' shortfall — noted</span></div></div>';
      } else {
        h+='<div class="secbox" style="border-color:#a14b39;background:rgba(224,122,95,.06)">'+
          '<div class="dl" style="margin-bottom:8px"><span style="color:#e07a5f">📉 Overlay of '+money(overlay)+'</span><span style="color:#76757a;font-size:11px">guarantee shortfall — for info</span></div>'+
          '<div style="font-size:12px;color:#9a999e;margin-bottom:10px">The guarantee was topped up this much. Nothing to fix — acknowledge to clear it from the dashboard\'s Needs action.</div>'+
          '<button class="ackoverlay" data-ack="'+c.id+'" style="width:100%;background:#a14b39;color:#fff;border:none;border-radius:8px;padding:10px;font-weight:600;cursor:pointer">✓ Acknowledge overlay</button>'+
        '</div>';
      }
    }

    // staff (whole night: this close-out + any paired cash-game close-out at same venue+date)
    const nightStaffIds=(CO_DATA||[]).filter(x=>x.venue_name===c.venue_name && x.game_date===c.game_date).map(x=>String(x.id));
    const nightShf=SHF_DATA.filter(s=>nightStaffIds.includes(String(s.closeout_id)));
    h+='<div class="dsec">👷 Staff <span style="font-size:11px;color:#76757a">(whole night)</span></div><div class="secbox">';
    h+= nightShf.length? nightShf.map(s=>{const hrs=Math.round((Number(s.hours)||0)*10)/10; const rate=Number(s.rate)||0; const t=(s.start&&s.finish)?(s.start+'–'+s.finish):(hrs+'h'); return '<div class="dl"><span>'+(s.staff_name||'')+(s.role?(' · '+s.role):'')+' · '+t+' · $'+rate+'/h</span><span>'+money(hrs*rate)+'</span></div>';}).join(''):'<div class="dmut">No staff recorded.</div>';
    h+='</div>';

    // prize pool breakdown
    h+='<div class="dsec">🎰 Prize pool</div><div class="secbox">';
    h+= row('Prize pool', money(pool))+
        row('Guarantee', money(gtee))+
        row('Overlay (shortfall)', overlay>0?money(overlay):money(0), overlay>0?'#e07a5f':'')+
        row('Total prizes paid', money(prizesPaid));
    h+='</div>';
    h+='<div class="dsec">💳 Prizes paid by</div><div class="secbox">';
    h+= row('Cash', money(pcash))+row('Transfer', money(ptfr))+row('Ticket', money(ptkt));
    h+='</div>';

    // winners
    h+='<div class="dsec">🏆 Winners</div><div class="secbox">';
    h+= plc.length? plc.filter(p=>Number(p.amount)>0).map(p=>{
      const a2=Number(p.amount_2)||0,a3=Number(p.amount_3)||0,a1=(Number(p.amount)||0)-a2-a3;
      const parts=[[p.paid_by,a1],[p.paid_by_2,a2],[p.paid_by_3,a3]].filter(x=>x[0]&&x[1]>0).map(x=>x[0]+' '+money(x[1])).join(' + ');
      return '<div class="dl"><span>'+p.place+suf(p.place)+' · '+(p.player_name||'(unassigned)')+'<br><span style="font-size:10px;color:#76757a">'+parts+'</span></span><span>'+money(p.amount)+'</span></div>';
    }).join(''):'<div class="dmut">No placings.</div>';
    h+='</div>';

    // players
    h+='<div class="dsec">👥 All players ('+players.length+')</div><div class="secbox">';
    h+= players.length? '<div class="dchips">'+players.map(n=>'<span class="dchip'+(winNames.has(n.toLowerCase())?' w':'')+'">'+(winNames.has(n.toLowerCase())?'🏆 ':'')+n+'</span>').join('')+'</div>':'<div class="dmut">No GES player list for this game.</div>';
    h+='</div>';

    // ===== UNIFIED: if a parallel Rake Free Cash Game ran this venue+date, fold it in as its own section =====
    const isThisCash = c.is_cash_game===true || c.game_name==='Rake Free Cash Game';
    if(!isThisCash){
      h += unifiedCashSection(c, g, {isVoid:false, margin, sms, promo, basis, rate2});
    }
    return h;
  }

  // Builds the Rake Free Cash Game section + Venue total for the day (used by both normal & void paths)
  function unifiedCashSection(c, g, opts){
    const money=n=>{n=Math.round(Number(n)||0);return (n<0?'-$':'$')+Math.abs(n).toLocaleString();};
    const row=(k,v,col)=>'<div class="dl"><span>'+k+'</span><span'+(col?(' style="color:'+col+'"'):'')+'>'+v+'</span></div>';
    const {isVoid, margin, sms, promo, basis, rate2}=opts;
    const cash=(CO_DATA||[]).find(x=>(x.is_cash_game===true||x.game_name==='Rake Free Cash Game') && x.venue_name===c.venue_name && x.game_date===c.game_date);
    if(!cash) return '';
    let h='';
    const cashPlayerList=((cash.ges_players||'').split(/\n|,/).map(s=>s.trim()).filter(Boolean));
    const cashPromo=Number(cash.promo_cost)||0;
    // staff for the whole night (tournament + cash game close-outs at this venue+date)
    const nightCoIds=(CO_DATA||[]).filter(x=>x.venue_name===c.venue_name && x.game_date===c.game_date).map(x=>String(x.id));
    const nightShifts=SHF_DATA.filter(s=>nightCoIds.includes(String(s.closeout_id)));
    const nightWagesAll=nightShifts.reduce((s,x)=>s+(Number(x.hours)||0)*(Number(x.rate)||0),0);
    // club money for the night (the venue fee — applies once because a game ran)
    let nightClub=0, nightClubLbl='';
    if(basis==='fixed_monthly'){ const ym=(c.game_date||'').slice(0,7); const gm=CO_DATA.filter(x=>x.venue_name===c.venue_name && (x.game_date||'').slice(0,7)===ym && !(x.is_cash_game===true||x.game_name==='Rake Free Cash Game')).length||1; nightClub=rate2/gm; nightClubLbl=' (monthly '+money(rate2)+' ÷ '+gm+')'; }
    else if(rate2){ nightClub=rate2; nightClubLbl=' (per game)'; }

    // for a void night, also show the night's staff breakdown here (the tournament card skipped it)
    if(isVoid){
      h+='<div class="dsec">👷 Staff <span style="font-size:11px;color:#76757a">(whole night)</span></div><div class="secbox">';
      if(nightShifts.length){
        h+= nightShifts.map(s=>{const hrs=Math.round((Number(s.hours)||0)*10)/10; const rate=Number(s.rate)||0; const t=(s.start&&s.finish)?(s.start+'–'+s.finish):(hrs+'h'); return '<div class="dl"><span>'+(s.staff_name||'')+(s.role?(' · '+s.role):'')+' · '+t+' · $'+rate+'/h</span><span>'+money(hrs*rate)+'</span></div>';}).join('');
      } else {
        const shiftCoIds=[...new Set(SHF_DATA.map(s=>String(s.closeout_id)))];
        h+='<div class="dmut">No staff matched this night.<br><span style="font-size:10px;color:#5a5a62">night close-out IDs: ['+nightCoIds.join(', ')+']<br>shift closeout_ids in system: ['+shiftCoIds.join(', ')+']<br>'+SHF_DATA.length+' total shifts. The cash game close-out id for tonight: '+(cash?cash.id:'none')+'</span></div>';
      }
      h+='</div>';
    }

    // distinct separation: cash game's own mini close-out sheet (players + promo only)
    h+='<div class="dsec" style="margin-top:22px;border-top:2px solid #2a3a4a;padding-top:16px">🎲 Rake Free Cash Game</div>'+
      '<div class="cobox" style="border-color:#2f4a63"><div class="dl"><span>Players</span><span>'+cashPlayerList.length+'</span></div>'+
      '<div class="dl"><span>Promotional cost</span><span style="color:'+(cashPromo>0?'#e07a5f':'#76757a')+'">'+(cashPromo>0?('-'+money(cashPromo)):money(0))+'</span></div></div>';

    // ===== FINAL P&L for the day (tournament + cash game + club − wages) — shown ABOVE the player list =====
    const tournamentGameNet = isVoid ? 0 : (g.name ? ((margin||0) - (sms||0) - (promo||0)) : 0);
    const dayTotal = tournamentGameNet + nightClub - nightWagesAll - cashPromo;
    h+='<div class="dsec" style="margin-top:18px">🏛 Final P&amp;L — venue for the day</div>'+
      '<div class="pnlbox" style="border-color:#c9b896">'+
      row(isVoid?'Tournament (void — no margin)':'Tournament gaming net', money(tournamentGameNet))+
      row('Plus: club money'+nightClubLbl, nightClub>0?('+'+money(nightClub)):money(0), nightClub>0?'#5cb88a':'#76757a')+
      (nightClub===0?'<div class="dmut" style="font-size:10px;margin:-4px 0 6px">⚠ No club-money rate set for '+(c.venue_name||'this venue')+' — set it on the Venues &amp; Invoicing screen so it shows here.</div>':'')+
      row('Less: staff wages (whole night)', nightWagesAll>0?('-'+money(nightWagesAll)):money(0), nightWagesAll>0?'#e07a5f':'')+
      row('Less: cash game promo', cashPromo>0?('-'+money(cashPromo)):money(0), cashPromo>0?'#e07a5f':'')+
      '<div class="netprofit '+(dayTotal>=0?'pos':'neg')+'"><span>VENUE NET FOR THE DAY</span><span class="npval">'+money(dayTotal)+'</span></div>'+
      '</div>'+
      '<div class="dmut" style="margin-top:6px;font-size:11px">Club money &amp; staff are counted once for the whole night (tournament + cash game combined).</div>';

    // cash game player list (last — it's the longest section)
    h+='<div class="dsec" style="margin-top:18px">👥 Cash game players ('+cashPlayerList.length+')</div><div class="secbox">';
    h+= cashPlayerList.length? '<div class="dchips">'+cashPlayerList.map(n=>'<span class="dchip">'+n+'</span>').join('')+'</div>':'<div class="dmut">No GES player list imported for the cash game.</div>';
    h+='</div>';
    return h;
  }

  async function signIn(){
    const email=$('email').value.trim(), password=$('password').value;
    if(!email||!password){ setStatus('Enter email and password.','err'); return; }
    $('signinBtn').disabled=true; setStatus('⏳ Signing in…','ok');
    try{
      const { data, error } = await supabase.auth.signInWithPassword({email,password});
      if(error) throw error;
      clearStatus(); showApp(data.user);
    }catch(e){ setStatus('✗ '+(e.message||e),'err'); }
    finally{ $('signinBtn').disabled=false; }
  }
  async function signOut(){ await supabase.auth.signOut(); clearStatus(); showLogin(); }

  function wireAck(container){
    container.querySelectorAll('.ackoverlay').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id=btn.dataset.ack;
        btn.disabled=true; btn.textContent='Saving…';
        try{
          const { data, error } = await supabase.from('closeouts').update({ overlay_ack:true }).eq('id', id).select();
          if(error) throw error;
          if(!data || !data.length){ throw new Error('Update saved nothing — likely a permissions (RLS) issue on the closeouts table. An UPDATE policy for admins is needed. See the note I can give you.'); }
          if(data[0].overlay_ack!==true){ throw new Error('The overlay_ack column did not update — it may not exist. Run the alter-table SQL to add it.'); }
          // update local copy + swap the block to the acknowledged state
          const co=CO_DATA.find(x=>String(x.id)===String(id)); if(co) co.overlay_ack=true;
          const box=btn.closest('.secbox');
          if(box){ box.style.borderColor='#5cb88a'; box.style.background='rgba(92,184,138,.06)'; box.innerHTML='<div class="dl"><span style="color:#5cb88a">✓ Overlay acknowledged</span><span style="color:#76757a;font-size:11px">noted</span></div>'; }
        }catch(e){ btn.disabled=false; btn.textContent='✓ Acknowledge overlay'; alert('Could not save: '+(e.message||e)); }
      });
    });
  }
  $('signinBtn').addEventListener('click', signIn);
  $('signoutBtn').addEventListener('click', signOut);
  $('password').addEventListener('keydown', e=>{ if(e.key==='Enter') signIn(); });

  (async ()=>{ const { data } = await supabase.auth.getSession(); if(data.session) showApp(data.session.user); else showLogin(); })();
</script>
</body>
</html>
