<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poker Palace — Admin View (Cloud)</title>
<style>
  body{margin:0;background:#16161a;color:#ecebe9;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;padding:26px 16px 60px;line-height:1.5}
  .wrap{max-width:620px;margin:0 auto}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:#a5a4a8;font-size:13.5px;margin:0 0 20px}
  .card{background:#22222a;border:1px solid #34343a;border-radius:14px;padding:18px;margin-bottom:16px}
  .card h2{font-size:15px;margin:0 0 12px}
  label{display:block;font-size:13px;color:#a5a4a8;margin:12px 0 5px}
  input{width:100%;box-sizing:border-box;background:#1e1e23;border:1px solid #34343a;border-radius:9px;color:#ecebe9;font-size:15px;padding:11px 12px;outline:none;font-family:inherit}
  input:focus{border-color:#7fa0c4}
  button{margin-top:16px;border:none;font-weight:600;font-size:15px;border-radius:10px;padding:13px;cursor:pointer}
  .primary{background:#7fa0c4;color:#0e1a26;width:100%} .primary:hover{filter:brightness(1.08)}
  .ghost{background:#2a2a30;border:1px solid #34343a;color:#ecebe9;padding:7px 12px;font-size:12.5px;margin:0}
  .ghost:hover{border-color:#e07a5f;color:#e07a5f}
  button:disabled{opacity:.5;cursor:not-allowed}
  .status{padding:12px 14px;border-radius:11px;font-size:13.5px;margin-bottom:16px;border:1px solid #34343a;background:#22222a;display:none}
  .status.show{display:block}
  .status.ok{border-color:#3f8c66;background:rgba(92,184,138,.1);color:#9fe3c0}
  .status.err{border-color:#a4493a;background:rgba(224,122,95,.1);color:#f0b3a3}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#22222a;border:1px solid #34343a;border-radius:11px;padding:11px 14px;margin-bottom:8px;font-size:13px}
  .bar .who{color:#a5a4a8} .bar .who b{color:#ecebe9}
  .rolepill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 9px;border-radius:20px;margin-left:6px}
  .rolepill.admin{background:rgba(201,184,150,.15);color:#c9b896}
  .rolepill.td{background:rgba(127,160,196,.15);color:#7fa0c4}
  .scope{font-size:12.5px;color:#a5a4a8;margin:14px 0 10px}
  .co{background:#22222a;border:1px solid #34343a;border-radius:11px;padding:13px 15px;margin-bottom:9px}
  .cotop{display:flex;justify-content:space-between;gap:10px}
  .coname{font-weight:700;font-size:15px}
  .codate{color:#a5a4a8;font-size:12.5px;font-family:'JetBrains Mono',monospace}
  .cometa{color:#a5a4a8;font-size:12.5px;margin-top:5px;font-family:'JetBrains Mono',monospace}
  .cowho{color:#7e90a5;font-size:11px;margin-top:6px;font-family:'JetBrains Mono',monospace}
  .coclick{cursor:pointer;transition:border-color .15s} .coclick:hover{border-color:#D00E26}
  .codetail{margin-top:10px;padding-top:10px;border-top:1px solid #34343a}
  .dgrid{display:grid;grid-template-columns:1fr auto 1fr auto;gap:5px 10px;font-size:12.5px;margin-bottom:8px}
  .dgrid .dk{color:#76757a} .dgrid .dv{font-family:'JetBrains Mono',monospace;text-align:right}
  .dsec{font-family:'Archivo',sans-serif;font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#a5a4a8;margin:11px 0 6px}
  .dl{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #26262b;font-size:12.5px} .dl:last-child{border-bottom:none} .dl span:last-child{font-family:'JetBrains Mono',monospace;color:#c9b896}
  .dmut{color:#76757a;font-size:12px;padding:4px 0}
  .dchips{display:flex;flex-wrap:wrap;gap:5px} .dchip{background:#1e1e23;border:1px solid #34343a;border-radius:13px;padding:4px 10px;font-size:12px;color:#a5a4a8} .dchip.w{background:rgba(201,184,150,.13);border-color:#c9b896;color:#c9b896;font-weight:600}
  .cobox{background:#1b1b21;border:1px solid #3a3a44;border-radius:10px;padding:12px 13px;margin-bottom:4px}
  .pnlbox{background:linear-gradient(160deg,#241f2e,#2a2438);border:1px solid #5a4a7a;border-radius:10px;padding:12px 13px;margin-bottom:4px;box-shadow:0 0 0 1px rgba(127,100,180,.15) inset}
  .secbox{background:#1c1d22;border:1px solid #313640;border-radius:10px;padding:11px 13px;margin-bottom:4px}
  .netprofit{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:12px 13px;border-radius:9px;background:rgba(92,184,138,.1);border:1px solid #3f8c66}
  .netprofit.neg{background:rgba(224,122,95,.1);border-color:#a14b39}
  .netprofit span:first-child{font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:.05em;color:#d8d8d8}
  .netprofit .npval{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;color:#5cb88a}
  .netprofit.neg .npval{color:#e07a5f}
  #app.hidden,#loginCard.hidden{display:none}
</style>

<div class="wrap">
  <h1>🛡️ Poker Palace — Admin View</h1>
  <p class="sub">Sign in. If you're an admin you'll see <b>all</b> close-outs; if you're a TD, only your own. The cloud enforces this — same page, different data per role.</p>

  <div id="status" class="status"></div>

  <div class="card" id="loginCard">
    <h2>Sign in</h2>
    <label>Email</label>
    <input id="email" type="email" placeholder="admin@test.com" autocomplete="username">
    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="primary" id="signinBtn">Sign in</button>
  </div>

  <div id="app" class="hidden">
    <div class="bar">
      <div class="who">Signed in as <b id="whoEmail">—</b> <span id="rolePill"></span></div>
      <button class="ghost" id="signoutBtn">Sign out</button>
    </div>
    <div class="scope" id="scope"></div>
    <div id="coList"></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const SUPABASE_URL = 'https://tqlwkqtlxvozrgsavupg.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_vzcUkFyHTKSHr5SQV6WUMA_XpiEOT0z';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  const $ = id => document.getElementById(id);

  function setStatus(m,k){ const s=$('status'); s.className='status show '+k; s.innerHTML=m; }
  function clearStatus(){ $('status').className='status'; }

  async function showApp(user){
    $('loginCard').classList.add('hidden');
    $('app').classList.remove('hidden');
    $('whoEmail').textContent = user.email;

    // look up this user's role from profiles
    let role = 'td';
    try {
      const { data, error } = await supabase.from('profiles').select('role').eq('user_id', user.id);
      if (!error && Array.isArray(data) && data.length) role = (data.find(r=>r.role==='admin')?'admin':(data[0].role||'td'));
    } catch(e){ /* no profile row → default td */ }

    $('rolePill').innerHTML = '<span class="rolepill '+(role==='admin'?'admin':'td')+'">'+role.toUpperCase()+'</span>';
    $('scope').innerHTML = (role==='admin')
      ? '👁️ You are an <b>admin</b> — the list below shows <b>every</b> close-out from all TDs.'
      : '🔒 You are a <b>TD</b> — the list shows <b>only your own</b> close-outs.';

    loadCloseouts();
  }
  function showLogin(){ $('app').classList.add('hidden'); $('loginCard').classList.remove('hidden'); }

  let CO_DATA=[], PLC_DATA=[], SHF_DATA=[], PROFMAP={}, TKMAP={}, GAMES_D=[], VENUES_D=[], SMS_D=[];
  function tdName(uid){ return (uid&&PROFMAP[String(uid).toLowerCase().trim()]) || (uid?('TD '+String(uid).slice(0,6)):'Unknown'); }
  async function loadCloseouts(){
    try{
      const { data, error } = await supabase.from('closeouts').select('*').order('id',{ascending:false});
      if(error) throw error;
      CO_DATA=data||[];
      // supporting data for detail + names
      PLC_DATA=(await supabase.from('placings').select('*')).data||[];
      SHF_DATA=(await supabase.from('staff_shifts').select('*')).data||[];
      const profs=(await supabase.from('profiles').select('*')).data||[];
      PROFMAP={}; profs.forEach(p=>{ if(p.user_id) PROFMAP[String(p.user_id).toLowerCase().trim()]=p.full_name||p.name||null; });
      const tks=(await supabase.from('tickets').select('*')).data||[];
      TKMAP={}; tks.forEach(t=>TKMAP[t.id]=t.name);
      GAMES_D=(await supabase.from('games').select('*')).data||[];
      VENUES_D=(await supabase.from('venues').select('*')).data||[];
      SMS_D=(await supabase.from('sms_charges').select('*')).data||[];
      if(!CO_DATA.length){ $('coList').innerHTML='<div class="co">No close-outs visible to you.</div>'; return; }
      $('coList').innerHTML = CO_DATA.map((c,i)=>
        '<div class="co coclick" data-co="'+i+'"><div class="cotop"><div class="coname">'+(c.game_name||'(no name)')+'</div>'+
        '<div class="codate">'+(c.game_date||'')+'</div></div>'+
        '<div class="cometa">'+(c.venue_name||'')+' · '+(c.entries||0)+' entries · money in $'+(c.money_in||0)+' · leftover $'+(c.leftover_cash||0)+'</div>'+
        '<div class="cowho">submitted by <b style="color:#c9b896">'+tdName(c.submitted_by)+'</b> <span style="float:right;color:#7fa0c4">tap for detail ›</span></div>'+
        '<div class="codetail" id="codetail'+i+'" style="display:none"></div></div>'
      ).join('');
      document.querySelectorAll('.coclick').forEach(el=>{
        el.addEventListener('click',()=>{ const i=+el.dataset.co; const d=$('codetail'+i); const open=d.style.display==='none'; d.style.display=open?'block':'none'; if(open&&!d.dataset.built){ d.innerHTML=coDetail(CO_DATA[i]); d.dataset.built='1'; wireAck(d); } });
      });
      // deep-link: if URL has #co=ID, auto-open that specific tournament and scroll to it
      const hash=window.location.hash||'';
      const mm=hash.match(/co=([^&]+)/);
      if(mm){
        const targetId=decodeURIComponent(mm[1]);
        const idx=CO_DATA.findIndex(c=>String(c.id)===String(targetId));
        if(idx>=0){
          const d=$('codetail'+idx);
          if(d){ d.style.display='block'; if(!d.dataset.built){ d.innerHTML=coDetail(CO_DATA[idx]); d.dataset.built='1'; wireAck(d); } }
          const card=document.querySelector('.coclick[data-co="'+idx+'"]');
          if(card){ card.style.outline='2px solid #7fa0c4'; card.style.borderRadius='12px'; setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'start'}),200); }
        }
      }
    }catch(e){ setStatus('Could not load close-outs: '+(e.message||e),'err'); }
  }
  function coDetail(c){
    const money=n=>{n=Math.round(Number(n)||0);return (n<0?'-$':'$')+Math.abs(n).toLocaleString();};
    const plc=PLC_DATA.filter(p=>String(p.closeout_id)===String(c.id)).sort((a,b)=>a.place-b.place);
    const shf=SHF_DATA.filter(s=>String(s.closeout_id)===String(c.id));
    const suf=n=>n===1?'st':n===2?'nd':n===3?'rd':'th';
    const players=((c.ges_players||'').split(/\n|,/).map(s=>s.trim()).filter(Boolean));
    const winNames=new Set(plc.filter(p=>Number(p.amount)>0).map(p=>(p.player_name||'').toLowerCase()));

    // --- economics from game setup ---
    const g=GAMES_D.find(x=>x.name===c.game_name)||{};
    const entries=Number(c.entries)||0, addons=Number(c.addons)||0;
    const buyin=Number(g.buy_in)||0, rake=Number(g.rake)||0, addonPrice=Number(g.addon_price)||0, gtee=Number(g.guarantee)||0;
    const pool=(buyin-rake)*entries + addonPrice*addons;
    const overlay=Math.max(0, gtee-pool);
    const rakeColl=rake*entries;
    const margin=rakeColl-overlay;
    const wages=shf.reduce((s,x)=>s+(Number(x.hours)||0)*(Number(x.rate)||0),0);
    // SMS attributed to this close-out (or matching game+date)
    const sms=SMS_D.filter(x=> (x.closeout_id&&String(x.closeout_id)===String(c.id)) || (!x.closeout_id&&x.game_name===c.game_name&&x.charge_date===c.game_date) ).reduce((s,x)=>s+(Number(x.amount)||0),0);
    // club money share
    const v=VENUES_D.find(x=>x.name===c.venue_name)||{};
    const basis=v.club_money_basis||'', rate2=Number(v.club_money_rate)||0;
    let club=0, clubLbl='';
    // for a void game, club only applies if a rake-free game ran same venue+date
    const voidHere = c.void===true;
    const rakeFreeRanTonight = (CO_DATA||[]).some(x=>x.venue_name===c.venue_name && x.game_date===c.game_date && (GAMES_D.find(gg=>gg.name===x.game_name)||{}).rake_free===true);
    if(voidHere && !rakeFreeRanTonight){
      club=0; clubLbl=' (void, no other game)';
    } else if(basis==='fixed_monthly'){
      const ym=(c.game_date||'').slice(0,7);
      const gamesThatMonth=CO_DATA.filter(x=>x.venue_name===c.venue_name && (x.game_date||'').slice(0,7)===ym).length || 1;
      club=rate2/gamesThatMonth; clubLbl=' (monthly '+money(rate2)+' ÷ '+gamesThatMonth+' games)';
    } else if(rate2){ club=rate2; clubLbl=' (per game)'; }
    const net=margin+club-wages-sms;
    const promo=Number(c.promo_cost)||0;
    const isRakeFree = g.rake_free===true;
    const isVoid = c.void===true;

    // --- prize payment breakdown (split-aware) ---
    let pcash=0,ptfr=0,ptkt=0;
    plc.forEach(p=>{
      const a2=Number(p.amount_2)||0,a3=Number(p.amount_3)||0,a1=(Number(p.amount)||0)-a2-a3;
      [[p.paid_by,a1],[p.paid_by_2,a2],[p.paid_by_3,a3]].forEach(([m,a])=>{ if(!m)return; if(m==='transfer')ptfr+=a; else if(m==='ticket')ptkt+=a; else pcash+=a; });
    });
    const prizesPaid=plc.reduce((s,p)=>s+(Number(p.amount)||0),0);

    const row=(k,v,col)=>'<div class="dl"><span>'+k+'</span><span'+(col?(' style="color:'+col+'"'):'')+'>'+v+'</span></div>';
    let h='<div class="dsec">📋 Close-out sheet</div><div class="cobox"><div class="dgrid">'+
      ['Entries|'+entries,'Unique|'+(c.unique_players||0),'Re-entries|'+(c.re_entries||0),'Add-ons|'+addons,
       'Cash in|'+money(c.cash_in),'Transfer in|'+money(c.transfer_in),'Ticket in|'+money(c.ticket_in),'Other in|'+money(c.other_in),
       'Money in|'+money(c.money_in),'Leftover|'+money(c.leftover_cash)].map(x=>{const[k,vv]=x.split('|');return '<div class="dk">'+k+'</div><div class="dv">'+vv+'</div>';}).join('')+'</div></div>';

    // P&L block
    h+='<div class="dsec">💵 Game P&amp;L</div>';
    if(isVoid){
      h+='<div class="pnlbox" style="border-color:#a14b39">'+
        '<div class="dl"><span>⛔ Game void — did not run</span><span style="color:#e07a5f">insufficient players</span></div>'+
        row('Rake / margin', money(0))+
        row('Guarantee liability', money(0)+' (void)')+
        row('Club money', club>0?('+'+money(club)+' (rake-free ran)'):money(0)+' (no other game)', club>0?'#5cb88a':'')+
        row('Less: staff wages', wages>0?('-'+money(wages)):money(0), wages>0?'#e07a5f':'')+
        '<div class="netprofit '+((club-wages)>=0?'pos':'neg')+'"><span>NET RESULT</span><span class="npval">'+money(club-wages)+'</span></div>'+
        '</div>';
    } else if(isRakeFree){
      const rfNet=-promo;
      h+='<div class="pnlbox">'+
        '<div class="dl"><span>🎲 Rake Free Cash Game</span><span style="color:#7fa0c4">no rake / margin</span></div>'+
        row('Promotion cost', promo>0?('-'+money(promo)):money(0), promo>0?'#e07a5f':'')+
        '<div class="netprofit '+(rfNet>=0?'pos':'neg')+'"><span>NET COST TO DAY</span><span class="npval">'+money(rfNet)+'</span></div>'+
        '</div>';
    } else {
    h+= g.name ? ('<div class="pnlbox">'+
      row('Rake collected ('+money(rake)+' × '+entries+')',money(rakeColl))+
      row('Less: overlay',overlay>0?('-'+money(overlay)):money(0), overlay>0?'#e07a5f':'')+
      '<div class="dl" style="border-top:1px solid #34343a"><span><b>Gaming margin</b></span><span style="font-family:JetBrains Mono">'+money(margin)+'</span></div>'+
      row('Club money'+clubLbl, club>0?('+'+money(club)):money(0), '#5cb88a')+
      row('Less: staff wages', wages>0?('-'+money(wages)):money(0), wages>0?'#e07a5f':'')+
      row('Less: SMS charges', sms>0?('-'+money(sms)):money(0), sms>0?'#e07a5f':'')+
      (promo>0?row('Less: promotion cost','-'+money(promo),'#e07a5f'):'')+
      '<div class="netprofit '+((net-promo)>=0?'pos':'neg')+'"><span>GAME NET PROFIT</span><span class="npval">'+money(net-promo)+'</span></div>'+
      '</div>'
    ) : '<div class="dmut">No game setup found for "'+(c.game_name||'')+'" — can\'t compute rake/overlay. (Game may be renamed or retired.)</div>';
    }

    // overlay acknowledgement (informational — overlay already paid; ack to clear the dashboard flag)
    if(overlay>0 && !isVoid && !isRakeFree){
      if(c.overlay_ack===true){
        h+='<div class="secbox" style="border-color:#5cb88a;background:rgba(92,184,138,.06)"><div class="dl"><span style="color:#5cb88a">✓ Overlay acknowledged</span><span style="color:#76757a;font-size:11px">'+money(overlay)+' shortfall — noted</span></div></div>';
      } else {
        h+='<div class="secbox" style="border-color:#a14b39;background:rgba(224,122,95,.06)">'+
          '<div class="dl" style="margin-bottom:8px"><span style="color:#e07a5f">📉 Overlay of '+money(overlay)+'</span><span style="color:#76757a;font-size:11px">guarantee shortfall — for info</span></div>'+
          '<div style="font-size:12px;color:#9a999e;margin-bottom:10px">The guarantee was topped up this much. Nothing to fix — acknowledge to clear it from the dashboard\'s Needs action.</div>'+
          '<button class="ackoverlay" data-ack="'+c.id+'" style="width:100%;background:#a14b39;color:#fff;border:none;border-radius:8px;padding:10px;font-weight:600;cursor:pointer">✓ Acknowledge overlay</button>'+
        '</div>';
      }
    }

    // staff (moved up — before prize sections)
    h+='<div class="dsec">👷 Staff</div><div class="secbox">';
    h+= shf.length? shf.map(s=>{const hrs=Math.round((Number(s.hours)||0)*10)/10; const rate=Number(s.rate)||0; const t=(s.start&&s.finish)?(s.start+'–'+s.finish):(hrs+'h'); return '<div class="dl"><span>'+(s.staff_name||'')+(s.role?(' · '+s.role):'')+' · '+t+' · $'+rate+'/h</span><span>'+money(hrs*rate)+'</span></div>';}).join(''):'<div class="dmut">No staff recorded.</div>';
    h+='</div>';

    // prize pool breakdown
    h+='<div class="dsec">🎰 Prize pool</div><div class="secbox">';
    h+= row('Prize pool', money(pool))+
        row('Guarantee', money(gtee))+
        row('Overlay (shortfall)', overlay>0?money(overlay):money(0), overlay>0?'#e07a5f':'')+
        row('Total prizes paid', money(prizesPaid));
    h+='</div>';
    h+='<div class="dsec">💳 Prizes paid by</div><div class="secbox">';
    h+= row('Cash', money(pcash))+row('Transfer', money(ptfr))+row('Ticket', money(ptkt));
    h+='</div>';

    // winners
    h+='<div class="dsec">🏆 Winners</div><div class="secbox">';
    h+= plc.length? plc.filter(p=>Number(p.amount)>0).map(p=>{
      const a2=Number(p.amount_2)||0,a3=Number(p.amount_3)||0,a1=(Number(p.amount)||0)-a2-a3;
      const parts=[[p.paid_by,a1],[p.paid_by_2,a2],[p.paid_by_3,a3]].filter(x=>x[0]&&x[1]>0).map(x=>x[0]+' '+money(x[1])).join(' + ');
      return '<div class="dl"><span>'+p.place+suf(p.place)+' · '+(p.player_name||'(unassigned)')+'<br><span style="font-size:10px;color:#76757a">'+parts+'</span></span><span>'+money(p.amount)+'</span></div>';
    }).join(''):'<div class="dmut">No placings.</div>';
    h+='</div>';

    // players
    h+='<div class="dsec">👥 All players ('+players.length+')</div><div class="secbox">';
    h+= players.length? '<div class="dchips">'+players.map(n=>'<span class="dchip'+(winNames.has(n.toLowerCase())?' w':'')+'">'+(winNames.has(n.toLowerCase())?'🏆 ':'')+n+'</span>').join('')+'</div>':'<div class="dmut">No GES player list for this game.</div>';
    h+='</div>';
    return h;
  }

  async function signIn(){
    const email=$('email').value.trim(), password=$('password').value;
    if(!email||!password){ setStatus('Enter email and password.','err'); return; }
    $('signinBtn').disabled=true; setStatus('⏳ Signing in…','ok');
    try{
      const { data, error } = await supabase.auth.signInWithPassword({email,password});
      if(error) throw error;
      clearStatus(); showApp(data.user);
    }catch(e){ setStatus('✗ '+(e.message||e),'err'); }
    finally{ $('signinBtn').disabled=false; }
  }
  async function signOut(){ await supabase.auth.signOut(); clearStatus(); showLogin(); }

  function wireAck(container){
    container.querySelectorAll('.ackoverlay').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id=btn.dataset.ack;
        btn.disabled=true; btn.textContent='Saving…';
        try{
          const { data, error } = await supabase.from('closeouts').update({ overlay_ack:true }).eq('id', id).select();
          if(error) throw error;
          if(!data || !data.length){ throw new Error('Update saved nothing — likely a permissions (RLS) issue on the closeouts table. An UPDATE policy for admins is needed. See the note I can give you.'); }
          if(data[0].overlay_ack!==true){ throw new Error('The overlay_ack column did not update — it may not exist. Run the alter-table SQL to add it.'); }
          // update local copy + swap the block to the acknowledged state
          const co=CO_DATA.find(x=>String(x.id)===String(id)); if(co) co.overlay_ack=true;
          const box=btn.closest('.secbox');
          if(box){ box.style.borderColor='#5cb88a'; box.style.background='rgba(92,184,138,.06)'; box.innerHTML='<div class="dl"><span style="color:#5cb88a">✓ Overlay acknowledged</span><span style="color:#76757a;font-size:11px">noted</span></div>'; }
        }catch(e){ btn.disabled=false; btn.textContent='✓ Acknowledge overlay'; alert('Could not save: '+(e.message||e)); }
      });
    });
  }
  $('signinBtn').addEventListener('click', signIn);
  $('signoutBtn').addEventListener('click', signOut);
  $('password').addEventListener('keydown', e=>{ if(e.key==='Enter') signIn(); });

  (async ()=>{ const { data } = await supabase.auth.getSession(); if(data.session) showApp(data.session.user); else showLogin(); })();
</script>
