<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Poker Palace — Tournament Clock</title>
<style>
  :root{
    --bg:#0d1410; --card:#16201a; --chip:#1b2620; --line:#2a3a30;
    --ink:#f3efe6; --ink-dim:#a9b3aa; --ink-faint:#6d7a70;
    --gold:#d8b863; --gold-bright:#e6cf8a; --good:#5cb88a; --red:#e07a5f; --amber:#e0ad55;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
  input,select,button{font-family:inherit}
  .hidden{display:none!important}
  @keyframes ppmove{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  /* login + setup */
  #login,#setup{max-width:700px;margin:32px auto;padding:20px}
  #login h1,#setup h1{font-size:21px;color:var(--gold);margin-bottom:4px}
  .sub{color:var(--ink-dim);font-size:13px;margin-bottom:16px}
  .fld{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:11px;color:var(--ink);font-size:15px;margin-bottom:10px}
  .btn{background:var(--gold);color:#1a1205;font-weight:700;border:none;border-radius:9px;padding:12px;font-size:15px;cursor:pointer;width:100%}
  .btn.sec{background:none;border:1px solid var(--line);color:var(--ink-dim);font-weight:600}
  .status{text-align:center;font-size:13px;margin-top:10px;min-height:18px}
  .status.err{color:var(--red)} .status.ok{color:var(--good)}
  a.exit{color:var(--ink-faint);font-size:12px;text-decoration:none;display:inline-block;margin-bottom:10px}
  .sect{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .sect h2{font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:12px}
  label{font-size:12px;color:var(--ink-dim);display:block;margin-bottom:4px}
  .row2{display:flex;gap:8px}.row2>*{flex:1}
  .pphint{font-size:11px;color:var(--ink-faint);margin-top:4px}
  .lvlrow{display:grid;grid-template-columns:30px 1fr 1fr 1fr 1fr 28px;gap:5px;align-items:center;margin-bottom:5px}
  .lvlrow input{padding:7px;font-size:13px;margin:0;background:var(--card);border:1px solid var(--line);border-radius:6px;color:var(--ink)}
  .lvlhead{font-size:10px;color:var(--ink-faint);text-transform:uppercase;text-align:center}
  .delx{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer}
  .breakrow{background:rgba(92,184,138,.08);border-radius:6px}

  /* clock display */
  #clockView{display:flex;flex-direction:column;min-height:100vh}
  .ch-logo{text-align:center;padding:1.4vh 0 1vh;border-bottom:1px solid #1d2a22}
  .ch-logo .brand{font-size:clamp(15px,2vw,26px);font-weight:600;color:var(--ink);letter-spacing:.05em}
  .ch-logo .spon{font-size:clamp(9px,1.1vw,14px);letter-spacing:.2em;color:var(--gold);margin-left:10px}
  .ch-main{flex:1;display:flex;align-items:center;justify-content:space-between;gap:1vw;padding:1.5vh 1.2vw}
  .ch-side{flex-shrink:0;display:flex;flex-direction:column;gap:1vh}
  .ch-left{width:clamp(120px,15vw,230px)}
  .ch-right{width:clamp(120px,15vw,230px)}
  .gamename{font-size:clamp(15px,1.8vw,30px);font-weight:600;color:var(--ink)}
  .venuename{font-size:clamp(9px,1vw,14px);letter-spacing:.14em;color:var(--ink-faint);margin-bottom:1vh}
  .bigbox{background:var(--card);border:1px solid var(--gold);border-radius:11px;padding:1.2vh 1vw;text-align:center}
  .bigbox .v{font-size:clamp(28px,3.6vw,60px);font-weight:700;color:var(--gold);line-height:1}
  .bigbox .l{font-size:clamp(8px,.9vw,13px);color:var(--ink-dim);letter-spacing:.08em;margin-top:.5vh}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:.7vh}
  .statbox{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:1vh .6vw;text-align:center}
  .statbox .v{font-size:clamp(16px,2vw,32px);font-weight:600;line-height:1}
  .statbox .l{font-size:clamp(7px,.8vw,11px);color:var(--ink-faint);letter-spacing:.06em;margin-top:.4vh}
  .breakbox{background:#111b15;border:1px solid var(--line);border-radius:9px;padding:1vh;text-align:center}
  .breakbox .l{font-size:clamp(8px,.9vw,12px);letter-spacing:.1em;color:var(--ink-faint)}
  .breakbox .v{font-size:clamp(16px,2vw,30px);font-weight:600;color:var(--good);font-variant-numeric:tabular-nums}
  .ch-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1vh;min-width:0}
  .watchwrap{width:clamp(280px,38vw,620px);max-width:100%}
  .watchwrap svg{width:100%;height:auto;display:block}
  .nextstrip{display:flex;align-items:center;justify-content:center;gap:1vw;background:#111b15;border:1px solid var(--line);border-radius:11px;padding:1vh 1.4vw;flex-wrap:wrap}
  .nextstrip .lbl{font-size:clamp(9px,1vw,14px);letter-spacing:.14em;color:var(--ink-faint);font-weight:600}
  .nextstrip .bl{font-size:clamp(16px,2vw,30px);font-weight:600;color:var(--gold)}
  .nextstrip .sep{color:var(--line);font-size:clamp(12px,1.4vw,20px)}
  /* payouts */
  .payhdr{text-align:center;margin-bottom:1vh}
  .payhdr .t{font-size:clamp(9px,1vw,13px);letter-spacing:.16em;color:var(--gold);font-weight:600}
  .payhdr .pool{font-size:clamp(16px,2vw,30px);font-weight:600;color:var(--ink);line-height:1.1}
  .payhdr .meta{font-size:clamp(7px,.8vw,11px);color:var(--ink-faint)}
  .payrow{display:flex;justify-content:space-between;align-items:baseline;padding:.5vh 0;gap:6px}
  .payrow .pl{font-size:clamp(11px,1.2vw,17px);color:var(--ink-dim);font-weight:600;flex-shrink:0}
  .payrow .amt{font-size:clamp(12px,1.3vw,18px);color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;margin-left:auto}
  .payrow .nm{font-size:clamp(9px,1vw,13px);color:var(--good);flex-shrink:0;max-width:42%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .payrow.first .pl{color:var(--gold)}
  .payrow.bubble{border-top:1px dashed var(--line);margin-top:.4vh;padding-top:.7vh}
  .payrow.bubble .pl,.payrow.bubble .amt{color:var(--good)}
  /* ticker */
  .ch-ticker{background:var(--card);border-top:1px solid var(--line);padding:1vh 0;overflow:hidden;white-space:nowrap}
  .ch-ticker .msg{display:inline-block;white-space:nowrap;font-size:clamp(13px,1.5vw,22px);color:var(--gold);font-weight:600;animation:ppmove 22s linear infinite}
  /* control bar */
  #ctrlBar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,20,16,.97);border-top:1px solid var(--line);padding:10px;display:flex;gap:7px;justify-content:center;flex-wrap:wrap;backdrop-filter:blur(8px);z-index:30}
  .cbtn{background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;min-width:56px}
  .cbtn.primary{background:var(--gold);color:#1a1205;border-color:var(--gold)}
  .cbtn.warn{border-color:var(--amber);color:var(--amber)}
  .cbtn:active{transform:scale(.96)}
  .ch-timer-warn .ch-digi{fill:var(--amber)!important}
  .tmpl-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer}
  .tmpl-item:hover{border-color:var(--gold)}
</style>
</head>
<body>

<div id="login">
  <a class="exit" href="index.html">‹ Back to Poker Palace</a>
  <h1>🃏 Tournament Clock</h1>
  <div class="sub">Sign in to set up and control the clock.</div>
  <input id="email" class="fld" type="email" placeholder="Email" autocomplete="username">
  <input id="password" class="fld" type="password" placeholder="Password" autocomplete="current-password">
  <button class="btn" id="signinBtn">Sign in</button>
  <div class="status" id="loginStatus"></div>
</div>

<div id="setup" class="hidden"></div>

<div id="clockView" class="hidden">
  <div class="ch-logo">
    <span class="brand" id="cLogoBrand">♠ POKER PALACE</span>
    <span class="spon hidden" id="cSpon">OFFICIAL TIMEKEEPER · <span id="cSponName"></span></span>
  </div>
  <div class="ch-main">
    <div class="ch-side ch-left">
      <div>
        <div class="gamename" id="cName">Tournament</div>
        <div class="venuename" id="cVenue"></div>
      </div>
      <div class="bigbox"><div class="v" id="cPlayers">0</div><div class="l">PLAYERS LEFT</div></div>
      <div class="statgrid">
        <div class="statbox"><div class="v" id="cEntries" style="color:var(--ink)">0</div><div class="l">ENTRIES</div></div>
        <div class="statbox"><div class="v" id="cPool" style="color:var(--gold)">$0</div><div class="l">POOL</div></div>
        <div class="statbox"><div class="v" id="cAvg" style="color:var(--ink)">0</div><div class="l">AVG STACK</div></div>
        <div class="statbox"><div class="v" id="cReg" style="color:var(--gold)">0</div><div class="l">RE-ENTRIES</div></div>
      </div>
      <div class="breakbox"><div class="l">NEXT BREAK IN</div><div class="v" id="cBreak">—</div></div>
    </div>

    <div class="ch-center">
      <div class="watchwrap" id="watchWrap"></div>
      <div class="nextstrip" id="nextStrip"></div>
    </div>

    <div class="ch-side ch-right">
      <div class="payhdr">
        <div class="t">PAYOUTS</div>
        <div class="pool" id="payPool">$0</div>
        <div class="meta" id="payMeta">—</div>
      </div>
      <div id="payList"></div>
      <div id="pintSponsor" class="hidden" style="margin-top:auto;padding-top:1.5vh;text-align:center">
        <div style="font-size:clamp(7px,.75vw,10px);letter-spacing:.16em;color:var(--ink-faint);margin-bottom:.5vh">PROUDLY SPONSORED BY</div>
        <div id="pintWrap" style="display:flex;justify-content:center"></div>
        <div id="pintName" style="font-size:clamp(7px,.8vw,11px);letter-spacing:.2em;color:#cfa84e;margin-top:.4vh;font-weight:600">SPONSOR</div>
      </div>
    </div>
  </div>
  <div class="ch-ticker"><div class="msg" id="cTicker">Welcome to Poker Palace</div></div>
</div>

<div id="ctrlBar" class="hidden">
  <button class="cbtn" id="btnPrev">‹ Prev</button>
  <button class="cbtn primary" id="btnPlay">▶ Start</button>
  <button class="cbtn" id="btnNext">Next ›</button>
  <button class="cbtn" id="btnMinus">−1m</button>
  <button class="cbtn" id="btnPlus">+1m</button>
  <button class="cbtn" id="btnMsg">✎ Message</button>
  <button class="cbtn warn" id="btnEdit">⚙ Setup</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://tqlwkqtlxvozrgsavupg.supabase.co';
const SUPABASE_KEY='sb_publishable_vzcUkFyHTKSHr5SQV6WUMA_XpiEOT0z';
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);
const $=id=>document.getElementById(id);
const money=n=>'$'+(Math.round(Number(n)||0)).toLocaleString();
const moneyShort=n=>{ n=Number(n)||0; return n>=1000 ? '$'+(n/1000).toFixed(n>=10000?0:1)+'k' : '$'+Math.round(n); };

const params=new URLSearchParams(location.search);
const VIEW_MODE=params.get('view')||'';
const CLOCK_ID=params.get('clock')||null;
const THEME=params.get('theme')||'';
const isDisplayOnly=(VIEW_MODE==='tv'||VIEW_MODE==='player');

let user=null, STATE=null, tickTimer=null, channel=null, GAMES_CACHE=[], TEMPLATES=[], editLevels=[];
let useWatch = (THEME!=='standard');

async function signIn(){
  const email=$('email').value.trim(), password=$('password').value;
  if(!email||!password){ ls('Enter email and password.','err'); return; }
  ls('Signing in…','ok');
  try{ const { data, error }=await supabase.auth.signInWithPassword({email,password}); if(error) throw error; await afterAuth(data.user); }
  catch(e){ ls(e.message||String(e),'err'); }
}
function ls(m,k){ const s=$('loginStatus'); s.className='status '+(k||''); s.textContent=m; }
async function afterAuth(u){ user=u; $('login').classList.add('hidden'); await bootControl(); }
async function bootDisplay(){ $('login').classList.add('hidden'); await loadState(); $('clockView').classList.remove('hidden'); subscribe(); startTick(); renderClock(); }
async function bootControl(){ await loadState(); if(!STATE||STATE.status==='setup'){ renderSetup(); } else { showClock(true); subscribe(); startTick(); } }

async function loadState(){
  let q=supabase.from('clock_state').select('*').order('updated_at',{ascending:false}).limit(1);
  if(CLOCK_ID) q=supabase.from('clock_state').select('*').eq('id',CLOCK_ID).limit(1);
  const { data }=await q; STATE=(data&&data.length)?data[0]:null;
}
function subscribe(){
  try{
    channel=supabase.channel('clock-live-'+(CLOCK_ID||'any'))
      .on('postgres_changes',{event:'*',schema:'public',table:'clock_state'},(payload)=>{
        if(payload.new){ if(!CLOCK_ID || String(payload.new.id)===String(CLOCK_ID)){ STATE=payload.new; renderClock(); } }
      }).subscribe();
  }catch(e){}
  setInterval(async ()=>{ if(isDisplayOnly){ await loadState(); renderClock(); } }, 5000);
}

function levels(){ return (STATE&&Array.isArray(STATE.levels))?STATE.levels:[]; }
function curLevel(){ const L=levels(); const i=STATE?STATE.current_level:0; return L[i]||null; }
function levelSeconds(lv){ return Math.round((Number(lv&&lv.minutes)||0)*60); }
function remainingSec(){
  if(!STATE) return 0; const lv=curLevel(); if(!lv) return 0;
  if(STATE.is_paused){ return (STATE.paused_remaining_sec!=null)?STATE.paused_remaining_sec:levelSeconds(lv); }
  if(!STATE.level_started_at) return levelSeconds(lv);
  const started=new Date(STATE.level_started_at).getTime();
  const elapsed=Math.floor((Date.now()-started)/1000);
  return Math.max(0, levelSeconds(lv)-elapsed);
}
function fmtTime(s){ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60); const ss=s%60; return m+':'+('0'+ss).slice(-2); }
function nextBreakSeconds(){
  if(!STATE) return null; const L=levels(); let i=STATE.current_level||0;
  if(L[i]&&L[i].isBreak) return 0;
  let total=remainingSec(); 
  for(let j=i+1;j<L.length;j++){ if(L[j].isBreak) return total; total+=levelSeconds(L[j]); }
  return null;
}

function showClock(withControl){
  $('setup').classList.add('hidden');
  $('clockView').classList.remove('hidden');
  pintStarted=false;
  if(withControl && !isDisplayOnly) $('ctrlBar').classList.remove('hidden');
  renderClock();
}

function renderClock(){
  if(!STATE) return;
  $('cName').textContent=STATE.game_name||'Tournament';
  $('cVenue').textContent=(STATE.venue_name||'').toUpperCase();
  if(STATE.sponsor_name){ $('cSpon').classList.remove('hidden'); $('cSponName').textContent=STATE.sponsor_name; }
  else { $('cSpon').classList.add('hidden'); }

  const lv=curLevel();
  const entries=Number(STATE.entries)||0, left=Number(STATE.players_left)||0, stack=Number(STATE.starting_stack)||0;
  const reentries=Number(STATE.reentries)||0;
  $('cEntries').textContent=entries;
  $('cPlayers').textContent=left;
  $('cReg').textContent=reentries;
  $('cPool').textContent=moneyShort(STATE.prize_pool);
  $('cAvg').textContent= left>0 ? Math.round((entries*stack)/left).toLocaleString() : '—';

  const nb=nextBreakSeconds();
  $('cBreak').textContent = (nb==null) ? '—' : fmtTime(nb);

  // next level strip
  const L=levels(); const nx=L[(STATE.current_level||0)+1];
  const ns=$('nextStrip');
  if(nx){
    if(nx.isBreak){ ns.innerHTML='<span class="lbl">NEXT</span><span class="bl" style="color:var(--good)">'+(nx.breakName||'BREAK')+'</span>'; }
    else { ns.innerHTML='<span class="lbl">NEXT · LVL '+(nx.level||'')+'</span><span class="bl">'+(Number(nx.sb)||0).toLocaleString()+'</span><span class="sep">/</span><span class="bl">'+(Number(nx.bb)||0).toLocaleString()+'</span>'+(Number(nx.ante)>0?('<span class="sep">/</span><span class="bl">'+(Number(nx.ante)||0).toLocaleString()+'</span>'):''); }
  } else { ns.innerHTML='<span class="lbl">FINAL LEVEL</span>'; }

  // ticker
  if(STATE.ticker_msg){ $('cTicker').textContent=STATE.ticker_msg; }

  // play button
  if($('btnPlay')) $('btnPlay').innerHTML = STATE.is_paused ? '▶ Start' : '⏸ Pause';

  renderWatch();
  renderPayouts();
  renderPint();
}

function renderWatch(){
  const lv=curLevel();
  const rem=remainingSec();
  const full=levelSeconds(lv)||1;
  const elapsedFrac=Math.min(1,Math.max(0,(full-rem)/full)); // 0 at start → 1 at end
  const handAngle=elapsedFrac*360; // sweeps clockwise once per level
  const sb = lv&&!lv.isBreak ? (Number(lv.sb)||0) : 0;
  const bb = lv&&!lv.isBreak ? (Number(lv.bb)||0) : 0;
  const ante = lv&&!lv.isBreak ? (Number(lv.ante)||0) : 0;
  const lvlLabel = lv ? (lv.isBreak ? (lv.breakName||'BREAK') : ('LEVEL '+(lv.level||(STATE.current_level+1)))) : '';
  const timeColor = rem<=10 ? '#e07a5f' : (rem<=60 ? '#e0ad55' : '#f6f2e6');
  const isBreak = lv && lv.isBreak;

  // theme comes from the saved STATE; default to the sponsor watch unless explicitly 'standard'
  const themeIsWatch = STATE ? (STATE.theme!=='standard') : useWatch;
  if(themeIsWatch){
    // if the watch is already drawn, just rotate the hand smoothly instead of redrawing (smoother, no flicker)
    const existingHand=document.getElementById('sweepHand');
    if(existingHand && $('watchWrap').dataset.lvl===String(STATE.current_level) && $('watchWrap').dataset.theme==='watch'){
      existingHand.setAttribute('transform','rotate('+handAngle+' 170 170)');
      const dg=document.getElementById('digiTime'); if(dg){ dg.textContent=fmtTime(rem); dg.setAttribute('fill',timeColor); }
      // keep sub-dials / labels current (blinds don't change within a level, so only timer + hand move)
      return;
    }
    $('watchWrap').innerHTML = watchSVG({sb,bb,ante,timer:fmtTime(rem),lvlLabel,timeColor,isBreak,sponsor:STATE.sponsor_name,handAngle});
    $('watchWrap').dataset.lvl=String(STATE.current_level); $('watchWrap').dataset.theme='watch';
  } else {
    $('watchWrap').innerHTML = plainSVG({sb,bb,ante,timer:fmtTime(rem),lvlLabel,timeColor,isBreak});
    $('watchWrap').dataset.theme='standard';
  }
}

function renderPayouts(){
  const pool=Number(STATE.prize_pool)||0;
  const pcts = Array.isArray(STATE.payout_pcts)&&STATE.payout_pcts.length ? STATE.payout_pcts : standardPayout(Number(STATE.entries)||0);
  const amts = calcPayouts(pcts, pool);
  const finishers = STATE.finishers || {}; // {place: name}
  const placesPaid = pcts.length;
  const left = Number(STATE.players_left)||0;
  $('payPool').textContent=money(pool);
  $('payMeta').textContent=placesPaid+' PAID · '+left+' LEFT';
  const ord=n=>{ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
  let html='';
  for(let i=0;i<pcts.length;i++){
    const place=i+1;
    const isBubble = (place===placesPaid);
    const nm = finishers[place]||'';
    html+='<div class="payrow'+(place===1?' first':'')+(isBubble?' bubble':'')+'">'+
      '<span class="pl">'+ord(place)+'</span>'+
      '<span class="amt">'+money(amts[i]||0)+'</span>'+
      (nm?'<span class="nm">'+nm+'</span>':'')+
    '</div>';
  }
  $('payList').innerHTML=html;
}

function paintTimer(){ if(STATE) renderWatch(); }

function startTick(){
  if(tickTimer) clearInterval(tickTimer);
  tickTimer=setInterval(()=>{
    if(!STATE) return;
    paintTimer();
    const nb=nextBreakSeconds(); $('cBreak').textContent=(nb==null)?'—':fmtTime(nb);
    if(!isDisplayOnly && !STATE.is_paused){ if(remainingSec()<=0) autoAdvance(); }
  },500);
}

function watchSVG(o){
  const sb=o.sb.toLocaleString(), bb=o.bb.toLocaleString(), ante=o.ante.toLocaleString();
  const sponsor=o.sponsor||'SPONSOR';
  const subInner = o.isBreak
    ? '<text x="170" y="178" text-anchor="middle" fill="#1c1404" font-size="22" font-weight="700" font-family="sans-serif">BREAK</text>'
    : '<g filter="url(#rShadow)"><circle cx="108" cy="170" r="39" fill="url(#rSub)" stroke="#6e521f" stroke-width="1"/><circle cx="108" cy="170" r="39" fill="none" stroke="#fff4cf" stroke-width="0.6" opacity="0.5"/></g>'+
      '<text x="108" y="158" text-anchor="middle" fill="#5a4418" font-size="7.5" letter-spacing="1" font-family="sans-serif" font-weight="600">SMALL BLIND</text>'+
      '<text x="108" y="183" text-anchor="middle" fill="#1c1404" font-size="24" font-weight="700" font-family="sans-serif">'+sb+'</text>'+
      '<g filter="url(#rShadow)"><circle cx="232" cy="170" r="39" fill="url(#rSub)" stroke="#6e521f" stroke-width="1"/><circle cx="232" cy="170" r="39" fill="none" stroke="#fff4cf" stroke-width="0.6" opacity="0.5"/></g>'+
      '<text x="232" y="158" text-anchor="middle" fill="#5a4418" font-size="7.5" letter-spacing="1" font-family="sans-serif" font-weight="600">BIG BLIND</text>'+
      '<text x="232" y="185" text-anchor="middle" fill="#1c1404" font-size="22" font-weight="700" font-family="sans-serif">'+bb+'</text>'+

function startPint(){
  const body=document.getElementById('body4'), head=document.getElementById('head4'), g=document.getElementById('g4'), lace=document.getElementById('lace4');
  if(!body) return;
  const topFull=44, headH=13, bottom=192, splitY=82;
  function setLevel(topY){
    body.setAttribute('y',topY); body.setAttribute('height',Math.max(0,bottom-topY));
    head.setAttribute('y',topY-headH+1); head.setAttribute('height',topY>=bottom-2?0:13);
    lace.setAttribute('y',topFull); lace.setAttribute('height',Math.max(0,topY-topFull));
  }
  function tween(from,to,dur,ease,done){ let s=null; function step(ts){ if(!s)s=ts; const t=Math.min(1,(ts-s)/dur); const e=ease?(t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2):t; setLevel(from+(to-from)*e); if(t<1)requestAnimationFrame(step); else if(done)done(); } requestAnimationFrame(step); }
  function seq(){
    if(!document.getElementById('body4')) return; // stopped (re-rendered)
    tween(topFull,splitY-2,1500,true,function(){
      if(g) g.setAttribute('fill','#ffd877');
      setTimeout(function(){ tween(splitY-2,bottom,3400,false,function(){ setTimeout(function(){ if(g) g.setAttribute('fill','#cfa84e'); if(lace) lace.setAttribute('height',0); tween(bottom,topFull,1200,false,function(){ setTimeout(seq,1000); }); },800); }); },1200);
    });
  }
  setLevel(topFull); setTimeout(seq,600);
}
function renderPint(){
  const themeIsWatch = STATE ? (STATE.theme!=='standard') : useWatch;
  const wrap=$('pintSponsor');
  if(!wrap) return;
  if(themeIsWatch && STATE && STATE.pint_sponsor!==''){
    wrap.classList.remove('hidden');
    if(!pintStarted){
      $('pintWrap').innerHTML=pintSVG();
      $('pintName').textContent=(STATE.pint_sponsor||'SPONSOR');
      pintStarted=true;
      startPint();
    }
  } else { wrap.classList.add('hidden'); }
}

async function pushState(patch){
  if(!STATE) return;
  const upd={ ...patch, updated_at:new Date().toISOString(), updated_by:user?user.id:null };
  Object.assign(STATE, upd); renderClock();
  try{ await supabase.from('clock_state').update(upd).eq('id',STATE.id); }catch(e){}
}
async function playPause(){
  if(!STATE) return;
  if(STATE.is_paused){
    const lv=curLevel(); const full=levelSeconds(lv);
    const rem=(STATE.paused_remaining_sec!=null)?STATE.paused_remaining_sec:full;
    const started=new Date(Date.now()-(full-rem)*1000).toISOString();
    await pushState({ is_paused:false, level_started_at:started, paused_remaining_sec:null });
  } else { await pushState({ is_paused:true, paused_remaining_sec:remainingSec() }); }
}
async function gotoLevel(idx){ const L=levels(); if(idx<0||idx>=L.length) return; await pushState({ current_level:idx, level_started_at:new Date().toISOString(), is_paused:false, paused_remaining_sec:null }); playDing(); }
function nextLevel(){ if(STATE) gotoLevel((STATE.current_level||0)+1); }
function prevLevel(){ if(STATE) gotoLevel((STATE.current_level||0)-1); }
async function autoAdvance(){ const L=levels(); const ni=(STATE.current_level||0)+1; if(ni<L.length){ gotoLevel(ni); } else { await pushState({ is_paused:true, paused_remaining_sec:0 }); } }
async function adjustMinutes(d){
  if(!STATE) return; const rem=remainingSec()+d*60;
  if(STATE.is_paused){ await pushState({ paused_remaining_sec:Math.max(0,rem) }); }
  else { const lv=curLevel(); const full=levelSeconds(lv); const started=new Date(Date.now()-(full-Math.max(0,rem))*1000).toISOString(); await pushState({ level_started_at:started }); }
}
async function editMessage(){ const m=prompt('Scrolling message:', STATE.ticker_msg||''); if(m!==null) pushState({ ticker_msg:m }); }
function playDing(){
  try{ const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=880; o.type='sine'; g.gain.setValueAtTime(0.001,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.4,ctx.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.9); o.start(); o.stop(ctx.currentTime+0.95); }catch(e){}
}

function standardPayout(entries){
  const n=Math.max(1,Math.round(Number(entries)||0)); let p;
  if(n<=6) p=[100]; else if(n<=9) p=[65,35]; else if(n<=15) p=[50,30,20];
  else if(n<=24) p=[45,27,18,10]; else if(n<=35) p=[40,24,15,12,9];
  else if(n<=49) p=[38,22,14,10,9,7]; else if(n<=74) p=[35,21,13,9,7,5.5,5,4.5];
  else if(n<=99) p=[32,19.5,12.5,8.5,6.5,5,4,3.5,3,2.5,3];
  else p=[30,18,11.5,8,6,4.6,3.6,3,2.5,2.2,2,1.8,1.6,1.4,1.8];
  const s=p.reduce((a,b)=>a+b,0); return p.map(x=>+(x*100/s).toFixed(3));
}
function calcPayouts(pcts,pool){
  pool=Math.round(Number(pool)||0); if(!pcts||!pcts.length||pool<=0) return pcts?pcts.map(()=>0):[];
  let r=pcts.map(p=>Math.round((pool*(Number(p)||0)/100)/5)*5);
  let diff=pool-r.reduce((a,b)=>a+b,0); let i=0,g=0;
  while(diff!==0&&g<10000){ const step=diff>0?5:-5; const idx=i%r.length; if(r[idx]+step>=0){ r[idx]+=step; diff-=step; } i++; g++; }
  return r;
}

$('signinBtn').addEventListener('click', signIn);
$('password').addEventListener('keydown', e=>{ if(e.key==='Enter') signIn(); });
$('btnPlay').addEventListener('click', playPause);

$('btnPrev').addEventListener('click', prevLevel);
$('btnPlus').addEventListener('click', ()=>adjustMinutes(1));
$('btnMinus').addEventListener('click', ()=>adjustMinutes(-1));
$('btnMsg').addEventListener('click', editMessage);
$('btnEdit').addEventListener('click', ()=>{ if(STATE){ STATE.status='setup'; } renderSetup(); });

async function renderSetup(){
  $('clockView').classList.add('hidden'); $('ctrlBar').classList.add('hidden');
  const s=$('setup'); s.classList.remove('hidden');
  const allGames=((await supabase.from('games').select('*').order('name')).data)||[];
  GAMES_CACHE=allGames.filter(g=>g.active!==false);
  const gameOpts='<option value="">— pick a game —</option>'+GAMES_CACHE.map(g=>'<option value="'+(g.name||'')+'">'+(g.name||'')+' · '+(g.venue_name||'')+'</option>').join('');
  s.innerHTML=
    '<a class="exit" href="index.html">‹ Back to Poker Palace</a>'+
    '<h1>🃏 Set up tournament clock</h1>'+
    '<div class="sub">Pick a game — its blind structure and payouts load automatically. Set the numbers, choose a theme, and launch.</div>'+
    '<div class="sect"><h2>1 · Tournament</h2>'+
      '<label>Which game?</label><select id="setGame" class="fld">'+gameOpts+'</select>'+
      '<div id="blindNote" class="pphint" style="margin-bottom:8px"></div>'+
      '<div class="row2"><div><label>Starting stack</label><input id="setStack" class="fld" type="number" value="10000"></div>'+
      '<div><label>Entries</label><input id="setEntries" class="fld" type="number" value="0"></div></div>'+
      '<div class="row2"><div><label>Players left</label><input id="setLeft" class="fld" type="number" value="0"></div>'+
      '<div><label>Prize pool $</label><input id="setPool" class="fld" type="number" value="0"></div></div>'+
    '</div>'+
    '<div class="sect"><h2>2 · Theme</h2>'+
      '<div class="row2"><button class="btn sec" id="themeStd" type="button">Standard clock</button><button class="btn sec" id="themeWatch" type="button">Sponsor watch</button></div>'+
      '<div id="sponsorWrap" class="hidden" style="margin-top:10px"><label>Sponsor name (shown on the dial)</label><input id="setSponsor" class="fld" placeholder="e.g. ACME WATCHES"><label>Second sponsor — pint (bottom-right, leave blank to hide)</label><input id="setPint" class="fld" placeholder="e.g. STOUT CO"></div>'+
      '<div class="pphint" id="themeNote">Standard clock selected.</div>'+
    '</div>'+
    '<button class="btn" id="launchBtn" style="margin-bottom:40px">🚀 Launch clock</button>';

  let pickedGame=null;
  $('setGame').addEventListener('change',(e)=>{
    pickedGame=GAMES_CACHE.find(g=>(g.name||'')===e.target.value)||null;
    const note=$('blindNote');
    if(pickedGame && Array.isArray(pickedGame.blind_levels) && pickedGame.blind_levels.length){
      editLevels=JSON.parse(JSON.stringify(pickedGame.blind_levels));
      note.innerHTML='✓ Loaded '+editLevels.length+' blind levels from this game.';
    } else { editLevels=[]; note.innerHTML='⚠ This game has no blind structure yet — set one up in Game Setup.'; }
    const ent=Number($('setEntries').value)||0;
    if(pickedGame && ent>0 && Number($('setPool').value)===0){ $('setPool').value=((Number(pickedGame.buy_in)||0)-(Number(pickedGame.rake)||0))*ent; }
  });
  $('setEntries').addEventListener('input',()=>{ if(!$('setLeft').value||Number($('setLeft').value)===0) $('setLeft').value=$('setEntries').value; });
  useWatch=true;
  const setTheme=(w)=>{ useWatch=w; $('themeStd').style.background=w?'none':'var(--gold)'; $('themeStd').style.color=w?'var(--ink-dim)':'#1a1205'; $('themeWatch').style.background=w?'var(--gold)':'none'; $('themeWatch').style.color=w?'#1a1205':'var(--ink-dim)'; $('sponsorWrap').classList.toggle('hidden',!w); $('themeNote').textContent=w?'Sponsor watch theme — green & gold timepiece (default).':'Standard clock selected.'; };
  $('themeStd').addEventListener('click',()=>setTheme(false));
  $('themeWatch').addEventListener('click',()=>setTheme(true));
  setTheme(true);
  $('launchBtn').addEventListener('click',()=>launchClock(pickedGame));
}

async function launchClock(pickedGame){
  const gameName=$('setGame').value;
  if(!gameName){ alert('Pick a game first.'); return; }
  if(!editLevels.length){ alert('This game has no blind structure. Set one up in Game Setup first.'); return; }
  const g=pickedGame||GAMES_CACHE.find(x=>(x.name||'')===gameName);
  const entries=Number($('setEntries').value)||0;
  const row={
    game_name:gameName, venue_name:g?g.venue_name:'', game_date:new Date().toISOString().slice(0,10),
    levels:editLevels, current_level:0, level_started_at:null, is_paused:true,
    paused_remaining_sec:Math.round((Number(editLevels[0].minutes)||20)*60),
    starting_stack:Number($('setStack').value)||10000,
    entries:entries, reentries:0,
    players_left:Number($('setLeft').value)||entries,
    prize_pool:Number($('setPool').value)||0,
    payout_pcts: (g&&Array.isArray(g.payout_structure)&&g.payout_structure.length)?g.payout_structure:standardPayout(entries),
    theme: useWatch?'watch':'standard',
    sponsor_name: useWatch ? ($('setSponsor').value.trim()||'SPONSOR') : null,
    pint_sponsor: useWatch ? ($('setPint').value.trim()||'') : '',
    ticker_msg:'Good luck everyone!',
    finishers:{},
    status:'running', updated_by:user?user.id:null, updated_at:new Date().toISOString()
  };
  try{
    let id=null;
    const ex=await supabase.from('clock_state').select('id').eq('game_name',gameName).eq('game_date',row.game_date).limit(1);
    if(ex.data&&ex.data.length){ id=ex.data[0].id; await supabase.from('clock_state').update(row).eq('id',id); }
    else { const ins=await supabase.from('clock_state').insert(row).select(); if(ins.error) throw ins.error; id=ins.data[0].id; }
    STATE={ ...row, id }; useWatch=(row.theme==='watch');
    showClock(true); subscribe(); startTick();
    const base=location.origin+location.pathname;
    setTimeout(()=>{ prompt('Clock launched! Share these links (copy):', 'TV: '+base+'?view=tv&clock='+id+'  |  Player: '+base+'?view=player&clock='+id); }, 300);
  }catch(e){ alert('Could not launch: '+(e.message||e)); }
}

(async ()=>{
  if(isDisplayOnly){ await bootDisplay(); return; }
  const { data }=await supabase.auth.getSession();
  if(data.session){ await afterAuth(data.session.user); }
})();
